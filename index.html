  const [lang, setLang] = useState('en');

  // Update html lang attribute

  // Update font based on language
  useEffect(() => {
    const body = document.body;
    if (lang === 'ko') body.style.fontFamily = "'Noto Serif KR', serif";
    else if (lang === 'vi') body.style.fontFamily = "'Noto Serif', Georgia, serif";
    else body.style.fontFamily = "'Source Serif 4', Georgia, serif";
  }, [lang]);

  if (!data) return React.createElement('div', { style: { color: '#888', fontFamily: 'monospace', padding: '80px', textAlign: 'center' } }, 'Loading data.json…');

  const t = data.i18n[lang] || data.i18n.en;

  const pages = {
    home: () => React.createElement(HomePage, { data, t, lang, navigate }),
    case: () => React.createElement(CasePage, { data, t, lang }),
    timeline: () => React.createElement(TimelinePage, { data, t, lang }),
    analysis: () => React.createElement(AnalysisPage, { data, lang }),
    sources: () => React.createElement(SourcesPage, { data, lang }),
    faq: () => React.createElement(FaqPage, { data, lang }),
    news: () => React.createElement(NewsPage, { t, lang })

  const currentPage = pages[route] || pages.home;

  return React.createElement('div', { id: 'app' },
    React.createElement(Topbar, { t, meta: data.meta }),

    currentPage(),

}
