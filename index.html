<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Record — Heeseung ENHYPEN Belift Statement Analysis</title>
<meta name="description" content="Fact-based sourced analysis. 16 documented contradictions in Belift Lab's statement about Heeseung leaving ENHYPEN.">
<meta property="og:title" content="The Record — Why Belift Lab's Explanation Doesn't Add Up">
<meta property="og:url" content="https://please-be-safe.github.io/belift-statement-analysis/">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a0b;
  --paper:#f5f0e8;
  --red:#c0392b;
  --red-dim:#8b2020;
  --red-glow:rgba(192,57,43,.12);
  --cream:#ede8df;
  --warm-gray:#2a2620;
  --mid:#4a4540;
  --dim:#7a7470;
  --faint:#aea9a4;
  --border:#d4cec7;
  --border-dark:#3a3530;
  --surface:#1a1714;
  --surface2:#221f1c;
  --surface3:#2e2b28;
  --text-body:#c8c2ba;
  --text-dim:#8a8480;
  --text-bright:#f0ebe3;
  --gold:#c9a84c;
  --mono:'DM Mono',monospace;
  --serif:'Cormorant Garamond',Georgia,serif;
  --body:'Source Serif 4',Georgia,serif;
}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--ink);
  color:var(--text-body);
  font-family:var(--body);
  font-size:17px;
  font-weight:300;
  line-height:1.82;
  min-height:100vh;
  /* grain texture */
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}
a{color:inherit;text-decoration:none}
strong{font-weight:600;color:var(--text-bright)}
em{font-style:italic}

/* ── TOPBAR ── */
.topbar{
  background:var(--red);
  padding:8px 52px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.9);
  letter-spacing:.22em;text-transform:uppercase;
}

/* ── NAV ── */
.sitenav{
  background:rgba(10,10,11,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-dark);
  padding:0 52px;
  display:flex;justify-content:space-between;align-items:center;
  height:60px;position:sticky;top:0;z-index:100;
}
.nav-logo{
  font-family:var(--mono);font-size:12px;font-weight:500;
  letter-spacing:.3em;color:var(--text-bright);cursor:pointer;
  transition:color .2s;
}
.nav-logo:hover{color:var(--red)}
.nav-links{display:flex;gap:28px}
.nav-links a{
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-dim);transition:color .2s;cursor:pointer;padding:4px 0;
  border-bottom:2px solid transparent;transition:all .2s;
}
.nav-links a:hover{color:var(--text-bright)}
.nav-links a.active{color:var(--text-bright);border-bottom-color:var(--red)}
.lang-btn{
  font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  background:none;border:1px solid var(--border-dark);color:var(--text-dim);
  padding:4px 9px;cursor:pointer;transition:all .15s;
}
.lang-btn:hover,.lang-btn.active{border-color:var(--red);color:var(--red);background:var(--red-glow)}
.lang-switcher{display:flex;gap:5px;margin-left:20px}

/* ── HERO ── */
.hero{
  padding:96px 52px 80px;
  position:relative;overflow:hidden;
  border-bottom:1px solid var(--border-dark);
  background:linear-gradient(160deg,var(--ink) 0%,var(--surface) 100%);
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(192,57,43,.07) 0%,transparent 70%);
  pointer-events:none;
}
.site-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--red);margin-bottom:28px;opacity:.9;
}
.hero h1{
  font-family:var(--serif);font-size:clamp(52px,7vw,88px);
  font-weight:700;color:var(--text-bright);line-height:1.02;
  letter-spacing:-1.5px;margin-bottom:32px;
}
.hero h1 em{font-style:italic;color:var(--red);font-weight:400}
.header-sub{
  font-size:18px;color:var(--text-dim);max-width:580px;
  line-height:1.78;font-weight:300;
}
.hero-bg-text{
  position:absolute;right:-40px;top:50%;transform:translateY(-50%);
  font-family:var(--serif);font-size:clamp(140px,20vw,260px);
  font-weight:700;color:rgba(255,255,255,.025);
  pointer-events:none;user-select:none;letter-spacing:-6px;font-style:italic;
}

/* ── COUNTER STRIP ── */
.counter-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--border-dark);
}
.counter-item{
  padding:36px 52px;border-right:1px solid var(--border-dark);
  transition:background .2s;
}
.counter-item:last-child{border-right:none}
.counter-item:hover{background:var(--surface)}
.counter-num{
  display:block;font-family:var(--serif);
  font-size:clamp(40px,5.5vw,68px);font-weight:700;
  color:var(--text-bright);line-height:1;margin-bottom:10px;
  font-style:italic;
}
.counter-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--text-dim);
}

/* ── PAGE HERO ── */
.page-hero{
  padding:72px 52px 56px;border-bottom:1px solid var(--border-dark);
  position:relative;overflow:hidden;
  background:linear-gradient(150deg,var(--ink) 0%,var(--surface) 100%);
}
.page-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 90% at 90% 50%,rgba(192,57,43,.06) 0%,transparent 70%);
}
.page-hero-inner .site-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--red);margin-bottom:18px;
}
.page-hero h1{
  font-family:var(--serif);font-size:clamp(38px,5.5vw,68px);
  font-weight:700;color:var(--text-bright);line-height:1.06;letter-spacing:-.5px;
}
.page-hero h1 em{font-style:italic;color:var(--red);font-weight:400}
.page-hero-desc{margin-top:18px;color:var(--text-dim);font-size:16px;max-width:580px;line-height:1.75}
.page-hero-bg{
  position:absolute;right:-20px;top:50%;transform:translateY(-50%);
  font-family:var(--serif);font-size:clamp(90px,15vw,200px);
  font-weight:700;color:rgba(255,255,255,.022);pointer-events:none;font-style:italic;
}

/* ── PAGE CONTENT ── */
.page-content-wrap{padding:56px 52px 96px;max-width:1180px}
.page-section{max-width:920px}

/* ── CONTENT SECTIONS ── */
.content-section{margin-top:52px;padding-top:52px;border-top:1px solid var(--border-dark)}
.section-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--text-dim);margin-bottom:22px;
}
.section-body h2{
  font-family:var(--serif);font-size:30px;font-weight:700;
  color:var(--text-bright);margin-bottom:24px;letter-spacing:-.3px;
}

/* ── SMOKING GUN ── */
.smoking-gun{
  border:1px solid rgba(192,57,43,.4);
  border-left:4px solid var(--red);
  background:rgba(192,57,43,.05);
  padding:32px 36px;margin:0 0 36px;
  position:relative;
}
.smoking-gun-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);margin-bottom:16px;opacity:.9;
}
.smoking-gun-quote{
  font-family:var(--serif);font-size:24px;font-style:italic;
  color:var(--text-bright);line-height:1.52;margin-bottom:14px;font-weight:600;
}
.smoking-gun-attribution{
  font-family:var(--mono);font-size:11px;color:var(--text-dim);
  letter-spacing:.06em;margin-bottom:18px;
}
.smoking-gun-context{
  font-size:15px;color:var(--text-dim);line-height:1.75;
  border-top:1px solid rgba(192,57,43,.2);padding-top:18px;margin-top:18px;
}

/* ── UPDATES ── */
.updates-list{list-style:none}
.update-item{
  padding:18px 0;border-bottom:1px solid var(--border-dark);
  display:grid;grid-template-columns:110px 1fr;gap:24px;align-items:start;
  transition:background .15s;
}
.update-item:hover{background:rgba(255,255,255,.015);padding-left:8px;padding-right:8px}
.update-date{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-dim);padding-top:3px;
}
.update-text{font-size:15px;color:var(--text-body);line-height:1.7}
.update-tag{
  display:inline-block;font-family:var(--mono);font-size:9px;
  letter-spacing:.15em;text-transform:uppercase;background:var(--red);
  color:#fff;padding:2px 7px;margin-left:8px;vertical-align:middle;
}

/* ── COMPARISON TABLE ── */
.comparison-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:15px}
.comparison-table th{
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-dim);padding:14px 20px;border:1px solid var(--border-dark);
  background:var(--surface2);text-align:left;
}
.comparison-table td{
  padding:18px 20px;border:1px solid var(--border-dark);
  color:var(--text-body);vertical-align:top;line-height:1.68;
  transition:background .15s;
}
.comparison-table tr:hover td{background:var(--surface)}

/* ── PAGE NAV ── */
.page-nav-list{display:flex;flex-direction:column;gap:2px;margin-top:20px}
.page-nav-item{
  display:grid;grid-template-columns:68px 1fr 28px;
  align-items:center;gap:20px;padding:22px 28px;
  background:var(--surface);border:1px solid var(--border-dark);
  transition:all .2s;cursor:pointer;
  border-left:3px solid transparent;
}
.page-nav-item:hover{
  background:var(--surface2);border-left-color:var(--red);
  transform:translateX(4px);
}
.page-nav-num{
  font-family:var(--serif);font-size:28px;font-weight:700;
  color:var(--red);font-style:italic;
}
.page-nav-title{
  font-family:var(--serif);font-size:19px;font-weight:700;
  color:var(--text-bright);margin-bottom:4px;
}
.page-nav-desc{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.04em}
.page-nav-arrow{font-size:18px;color:var(--red);text-align:right;opacity:.7}

/* ── ARGUMENTS ── */
.argument-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border-dark)}
.argument{border-bottom:1px solid var(--border-dark)}
.argument-header{
  display:grid;grid-template-columns:140px 1fr;gap:20px;
  padding:24px 0;cursor:pointer;transition:opacity .15s;
}
.argument-header:hover{opacity:.8}
.argument-num{
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--red);padding-top:4px;line-height:1.5;
}
.argument-title{
  font-family:var(--serif);font-size:20px;font-weight:700;
  color:var(--text-bright);line-height:1.35;
}
.argument-body{
  padding:0 0 28px 160px;display:none;
  animation:slideIn .25s ease;
}
.argument.open .argument-body{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.argument-body p{
  color:var(--text-body);font-size:16px;line-height:1.82;margin-bottom:16px;
}
.argument-quote{
  border-left:3px solid var(--red);padding:12px 20px;margin:16px 0;
  font-family:var(--serif);font-style:italic;color:var(--text-bright);
  font-size:17px;background:rgba(192,57,43,.04);
}
.argument-verdict{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--red);
  border-top:1px solid var(--border-dark);padding-top:16px;margin-top:20px;
}
.argument-actions{display:flex;gap:10px;margin-top:14px}
.copy-btn,.card-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  background:none;border:1px solid var(--border-dark);color:var(--text-dim);
  padding:8px 16px;cursor:pointer;transition:all .15s;
}
.copy-btn:hover,.card-btn:hover{border-color:var(--text-bright);color:var(--text-bright)}

/* ── PROGRESS BAR ── */
.progress-bar-wrap{
  margin:36px 0;padding:24px 28px;
  background:var(--surface);border:1px solid var(--border-dark);
}
.progress-bar-label{
  display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;
}
.progress-track{height:3px;background:var(--border-dark);border-radius:2px}
.progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width 1s ease}
.progress-note{font-size:13px;color:var(--text-dim);margin-top:10px;line-height:1.6}

/* ── CONCLUSION ── */
.conclusion-box{
  background:var(--surface);border:1px solid var(--border-dark);
  border-left:4px solid var(--red);padding:32px 36px;margin-top:52px;
}
.conclusion-box-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);margin-bottom:16px;
}
.conclusion-box-text{font-size:16px;color:var(--text-body);line-height:1.82}

/* ── TIMELINE ── */
.visual-timeline{position:relative;padding-left:44px}
.visual-timeline::before{
  content:'';position:absolute;left:8px;top:8px;bottom:8px;
  width:1px;background:var(--border-dark);
}
.vt-item{position:relative;margin-bottom:40px}
.vt-item::before{
  content:'';position:absolute;left:-40px;top:7px;
  width:10px;height:10px;border-radius:50%;
  background:var(--surface3);border:1px solid var(--border-dark);
  transition:transform .2s;
}
.vt-item:hover::before{transform:scale(1.3)}
.vt-item.contradiction::before{background:var(--red);border-color:var(--red);box-shadow:0 0 8px rgba(192,57,43,.4)}
.vt-item.official::before{background:#4a7fbf;border-color:#6a9fd8}
.vt-item.public::before{background:#5cb85c;border-color:#7ecf7e}
.vt-contradiction-flag{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--red);margin-bottom:6px;
}
.vt-date{
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-dim);margin-bottom:7px;
}
.vt-title{
  font-family:var(--serif);font-size:19px;font-weight:700;
  color:var(--text-bright);margin-bottom:9px;line-height:1.33;
}
.vt-body{font-size:15px;color:var(--text-dim);line-height:1.72}

/* ── ANALYSIS ── */
.analysis-item{padding:36px 0;border-bottom:1px solid var(--border-dark)}
.status-badge{
  display:inline-block;font-family:var(--mono);font-size:10px;
  letter-spacing:.16em;text-transform:uppercase;
  padding:3px 12px;border:1px solid;margin-bottom:16px;
}
.badge-unresolved{color:var(--red);border-color:var(--red);background:rgba(192,57,43,.08)}
.badge-partial{color:#d4a030;border-color:#d4a030;background:rgba(212,160,48,.08)}
.analysis-claim{
  background:var(--surface);border:1px solid var(--border-dark);
  padding:22px 26px;margin-bottom:20px;border-left:3px solid var(--border-dark);
}
.analysis-claim-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;
}
.analysis-claim-text{font-family:var(--serif);font-style:italic;color:var(--text-bright);font-size:17px;line-height:1.6}
.analysis-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;
  background:var(--border-dark);border:1px solid var(--border-dark);
}
.analysis-col{background:var(--ink);padding:22px}
.analysis-col-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;
}
.analysis-col-body{font-size:14px;color:var(--text-body);line-height:1.72}
.assessment-inconsistent{color:#d07070}
.assessment-unanswered{color:#c4933a}

/* ── SOURCES ── */
.source-category{margin-bottom:52px}
.source-category-title{
  font-family:var(--mono);font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--red);
  padding-bottom:14px;border-bottom:1px solid var(--border-dark);margin-bottom:20px;
}
.source-item{
  display:grid;grid-template-columns:64px 1fr;gap:20px;
  padding:20px 0;border-bottom:1px solid var(--border-dark);
  transition:background .15s;
}
.source-item:hover{padding-left:8px;padding-right:8px;background:rgba(255,255,255,.015)}
.source-id{
  font-family:var(--mono);font-size:12px;font-weight:500;
  color:var(--red);padding-top:2px;
}
.source-title{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.source-meta{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:6px}
.source-note{font-size:14px;color:var(--text-dim);line-height:1.68;margin-bottom:8px}
.source-link{
  font-family:var(--mono);font-size:11px;color:var(--red);letter-spacing:.05em;
  transition:opacity .15s;
}
.source-link:hover{opacity:.7;text-decoration:underline}

/* ── FAQ ── */
.faq-item{border-bottom:1px solid var(--border-dark)}
.faq-trigger{
  width:100%;background:none;border:none;padding:24px 0;
  display:flex;justify-content:space-between;align-items:flex-start;
  cursor:pointer;gap:24px;text-align:left;transition:opacity .15s;
}
.faq-trigger:hover{opacity:.8}
.faq-q{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--text-bright);line-height:1.38}
.faq-icon{
  font-family:var(--mono);font-size:22px;color:var(--red);
  flex-shrink:0;transition:transform .3s ease;line-height:1;margin-top:2px;
}
.faq-body{overflow:hidden;max-height:0;transition:max-height .38s ease}
.faq-item.open .faq-body{max-height:700px}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.faq-a p{font-size:15px;color:var(--text-dim);line-height:1.82;padding-bottom:24px}

/* ── AI NEWS ── */
.ai-news-box{
  background:var(--surface);border:1px solid var(--border-dark);
  padding:36px 40px;margin-bottom:24px;
}
.ai-news-input{
  width:100%;background:var(--ink);border:1px solid var(--border-dark);
  color:var(--text-bright);font-family:var(--mono);font-size:13px;
  padding:13px 16px;margin:12px 0;outline:none;letter-spacing:.08em;
  transition:border-color .2s;
}
.ai-news-input:focus{border-color:var(--red)}
.ai-news-result{
  background:var(--ink);border:1px solid var(--border-dark);
  border-left:3px solid var(--red);padding:24px 28px;margin-top:20px;
  font-size:15px;line-height:1.85;white-space:pre-wrap;color:var(--text-body);
}
.search-btn{
  background:var(--red);color:#fff;border:none;
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  padding:13px 28px;cursor:pointer;transition:background .2s;
}
.search-btn:hover{background:var(--red-dim)}
.search-btn:disabled{background:var(--surface3);color:var(--text-dim);cursor:not-allowed}
.err-msg{margin-top:16px;color:var(--red);font-size:13px;font-family:var(--mono)}

/* ── SHARE ── */
.share-bar{position:fixed;bottom:28px;right:28px;z-index:200}
.share-btn{
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  background:var(--red);color:#fff;border:none;
  padding:13px 22px;cursor:pointer;
  box-shadow:0 4px 28px rgba(0,0,0,.6);transition:all .2s;
}
.share-btn:hover{background:var(--red-dim);transform:translateY(-1px)}
.share-toast{
  position:fixed;bottom:84px;right:28px;
  background:var(--text-bright);color:var(--ink);
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  padding:10px 18px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:201;
}
.share-toast.show{opacity:1}

/* ── FOOTER ── */
.sitefooter{

var D={"meta": {"lastUpdated": "March 22, 2026", "totalArguments": 16, "totalSources": 51, "petitionSignatures": "2,084,798", "resolved": 1, "partial": 1}, "updates": [{"date": "Mar 22, 2026", "tag": "New", "text": "Yizhiyu Fan Call R4 scheduled 8:00 PM KST — listed as \"ENHYPEN / Heeseung.\" First scheduled post-departure fan interaction. Still commercially presented under ENHYPEN album event. Source: X fan documentation."}, {"date": "Mar 21, 2026", "tag": "New", "text": "Ni-ki confirms six-member status on live. When asked to perform ENHYPEN choreography: \"You have to watch all six members. There's no point in doing it alone.\" Third documented member public reference to group's current status. Source: Koreaboo."}, {"date": "Mar 21, 2026", "tag": "New", "text": "Shanghai fansign (Yizhiyu, in-person) canceled — Heeseung will not attend. Official Yizhiyu announcement. Full refunds being processed. Fourth commercial schedule disrupted since March 10. Source: Koreaboo."}, {"date": "Mar 20, 2026", "tag": null, "text": "Heeseung still listed as ENHYPEN member on major Korean portal sites — 11 days after official announcement. No profile information updated. Source: StarNews Korea."}, {"date": "Mar 19, 2026", "tag": null, "text": "New fancall lists \"ENHYPEN / Heeseung\" — Heeseung listed separately from group name for ENHYPEN album event. Source: Koreaboo."}, {"date": "Mar 18, 2026", "tag": null, "text": "NPS International Pension Service Center disrupted by approximately 1,500 emails. NPS confirms no intervention in corporate personnel decisions. This site does not endorse this action."}, {"date": "Mar 17, 2026", "tag": null, "text": "Change.org petition closed at 2,084,798 signatures. Jay's Weverse comment on a Heeseung post (\"AI detected\") deleted in real time — documented by Koreaboo."}, {"date": "Mar 15, 2026", "tag": null, "text": "Belift reaffirms to Korea Herald — first time reason given for why parallel solo was impossible. Melbourne flight confirmed canceled ~March 12 by named source Shivani Srinivasan. One of 16 contradictions partially addressed."}, {"date": "Mar 13, 2026", "tag": null, "text": "OT7 merchandise released again — second documented OT7 commercial release after departure announcement. Source: Sportskeeda."}, {"date": "Mar 12, 2026", "tag": null, "text": "En-O'Clock suspended. Melbourne flight canceled approximately 2 days before the event."}, {"date": "Mar 11, 2026", "tag": null, "text": "Jake confirms choreography urgently restructured on live Australian TV (The Morning Show). Neither Jake nor Jay discussed Heeseung's departure. Source: Billboard."}, {"date": "Mar 10, 2026", "tag": null, "text": "Heeseung's departure announced. OT7 merchandise scheduled 5:00 PM KST, pulled 40 minutes after notice. Four independent letter translations all attribute direction to company."}], "arguments": [{"id": "ARG 01", "title": "Belift's statement is self-defeating in a single paragraph", "verdict": "Internally inconsistent", "status": "unresolved", "body": "Belift's own statement reads: \"It's difficult to relay the whole process through a short notice, but this decision comes after extensive deliberation.\" If the deliberation was genuinely extensive — prolonged, substantive, carefully considered — then the company had ample time to prepare a comprehensive statement. No external force required the short notice format. HYBE is South Korea's third-largest entertainment conglomerate with a professional PR infrastructure. \"It's difficult to relay the whole process\" is not an acknowledgment of complexity. It is an acknowledgment of concealment. These two claims — extensive deliberation, insufficient time to explain — cannot both be true when the same party controls both the timeline and the platform."}, {"id": "ARG 02", "title": "A contract with 20 months remaining — and no explanation for why it was broken", "verdict": "No precedent. No explanation.", "status": "unresolved", "body": "Heeseung's exclusive contract with Belift Lab runs until November 2027 — approximately 20 months from the date of announcement. Belift confirmed the departure has nothing to do with contract renewal. In the K-pop industry, mid-contract departures occur under three documented circumstances: health crises, irreconcilable internal conflict, or forced restructuring by the company. Belift formally ruled out all three. This is the first lineup change since ENHYPEN's debut in November 2020 — over five years of an intact roster. No industry precedent supports a voluntary mid-contract departure under the circumstances Belift has described."}, {"id": "ARG 03", "title": "Billboard asked a direct causal question — Belift did not answer it", "verdict": "Direct question. Non-answer on record.", "status": "partial", "body": "When Billboard asked directly why Heeseung could not pursue solo activities while remaining in ENHYPEN — citing BTS and BLACKPINK members as precedent — Belift's full response was: \"We concluded that allowing HEESEUNG to focus fully on his career as a solo artist, rather than pursuing solo activities within the team, would be the most fulfilling approach for both ENHYPEN and HEESEUNG.\" The question: Why was the parallel model structurally impossible? The answer: We decided not being parallel was best. That is not an answer. TXT's Yeonjun pursues solo activities while remaining a full member of TXT under HYBE itself. On March 15, Belift finally gave a reason: \"Enhypen's schedule remains extremely demanding throughout the year.\" That answer took 5 days and a press inquiry to produce."}, {"id": "ARG 04", "title": "Heeseung's own letter does not use the language of a self-initiated decision", "verdict": "Passive framing. Direction originated externally.", "status": "unresolved", "body": "Four independent translations of the same Weverse post. HYBE official (Billboard): \"I ultimately made a big decision in line with the direction that was discussed.\" Manila Bulletin: \"I've made the bold decision to follow the direction the company has suggested.\" StarNews Korea: \"depending on the direction the company suggested.\" Rolling Stone Australia: \"according to the direction the company suggested.\" None constitute the language of independent, self-originated agency. The standard for voluntary K-pop departure statements is consistent: \"I decided,\" \"I wanted,\" \"I chose.\" Heeseung's letter uses none of these. It says the direction existed before him and he followed it."}, {"id": "ARG 05", "title": "En-O'Clock — the single most damaging piece of material evidence", "verdict": "Production continued past the alleged decision point.", "status": "unresolved", "body": "On March 12, Belift Lab announced that En-O'Clock — a weekly pre-recorded variety series — would be \"temporarily suspended\" and would \"return in April with better content.\" En-O'Clock is pre-recorded and pre-edited content. It cannot air weekly without being filmed at least several weeks in advance. This means: as of March 10, Belift was holding completed episodes featuring Heeseung that they cannot now release. The suspension was necessary because those episodes must be re-edited or re-filmed to remove him. If this departure was the product of extensive, long-running deliberation — why was content still being filmed with Heeseung close enough to the announcement date that its release is now impossible? There is only one answer: the decision arrived too late to halt production in time."}, {"id": "ARG 06", "title": "OT7 merchandise was released and pulled on the same day as the announcement", "verdict": "OT7 merch on departure day. Irreconcilable with advance planning.", "status": "unresolved", "body": "On March 10, ENHYPEN World published an announcement for new official merchandise scheduled to open at 5:00 PM KST featuring all seven members including Heeseung. Forty minutes after the departure notice went live, ENHYPEN World posted again: the launch had been \"inevitably changed.\" A company that spent months carefully planning a founding member's departure does not schedule OT7 merchandise to open at 5:00 PM KST on the same day as the announcement. The merchandise was not pre-pulled before the announcement. It was publicly scheduled, then retracted forty minutes after the departure notice. Source: kpopworld.com March 10, 2026."}, {"id": "ARG 07", "title": "The commercial timing paradox has no coherent solution", "verdict": "Two-day gap. One of two scenarios — both damaging.", "status": "unresolved", "body": "ENHYPEN released The Sin: Vanish in January 2026, debuted at Coachella, and completed the Walk the Line World Tour. Sunghoon publicly confirmed upcoming tour activity for 2026. On March 8 — two days before the announcement — Heeseung himself publicly discussed plans to return to Europe with the group. The logic is binding: if deliberation had already concluded before March 10, Heeseung discussed future tour dates knowing he was about to leave. That is direct misrepresentation to the public. If deliberation had not yet concluded as of March 8, then the announcement was not the product of extensive deliberation. One of these must be true. Both cannot be."}, {"id": "ARG 08", "title": "Melbourne and choreography confirm the departure was abrupt", "verdict": "International schedule disrupted four days out.", "status": "unresolved", "body": "ENHYPEN was scheduled to headline an event in Melbourne on March 14 — four days after the announcement. Concert promoter Applewood officially confirmed Heeseung would not be performing. Multiple sources reported he was expected to travel with the group until days before the announcement. Additionally, member Jake confirmed on live Australian TV that stage choreography had been recently reorganized — meaning formations were still being built around seven members close enough to the announcement that they required urgent restructuring afterward. A departure planned months in advance does not result in a member being pulled from international travel four days out."}, {"id": "ARG 09", "title": "El Capitxn found out from the news — not from Heeseung or Belift", "verdict": "Close collaborator. Zero advance notice.", "status": "unresolved", "body": "El Capitxn, a producer with a direct professional working relationship to Heeseung, publicly acknowledged: \"I couldn't get in contact with him, so I first learned about it from the news.\" Belift claims the decision involved extensive deliberation with many people over a long period. A person with a direct professional relationship to the departing artist found out the same way fans did — from a public announcement. This is consistent with a decision that was not widely communicated in advance, which is inconsistent with extensive, long-running deliberation involving many people."}, {"id": "ARG 10", "title": "2 million signatures is not \"mixed reactions\"", "verdict": "Documented mischaracterization of public response.", "status": "unresolved", "body": "Within 72 hours of the announcement, a Change.org petition surpassed 1.6 million signatures from dozens of countries. The petition closed at 2,084,798 signatures. Over 18 protest trucks were deployed outside HYBE headquarters. Fans from Singapore organized consecutive days of demonstrations. Belift's statement: \"We understand that this news is a lot to process and may be received with mixed reactions.\" 2 million signatures moving in one direction is not mixed reactions. It is a unified, cross-continental response. Describing this scale of response as \"mixed\" is itself a documented mischaracterization of the public record."}, {"id": "ARG 11", "updatedLabel": "Updated March 15", "title": "Jake confirmed choreography restructuring on live television — and neither member discussed Heeseung at all", "verdict": "Member-confirmed on live TV. Departure not discussed. Both documented by Billboard.", "status": "unresolved", "body": "On March 11, Jake and Jay appeared on Australia's The Morning Show. Billboard: \"There's been a bit of changes in the choreo with the formation, all that. So we've been practicing a lot.\" SE7EN.ws: \"There have been significant adjustments to our choreography and stage formations to prepare for the Hello Melbourne festival.\" Both versions confirm the same documented fact: stage formations were being actively restructured after the departure announcement. A departure planned months in advance does not require urgent formation changes days before an international performance. Billboard also confirmed that Jake and Jay \"did not discuss\" Heeseung's departure during the interview at all — despite it being the single most significant thing to happen to the group in five years."}, {"id": "ARG 12", "updatedLabel": "Updated March 15", "title": "OT7 merchandise released on March 13 — three days after the departure announcement", "verdict": "OT7 merch on March 10. OT7 merch again on March 13. Both after announcement.", "status": "unresolved", "body": "On March 13, 2026 — three days after Heeseung's departure was announced — ENHYPEN World released new official merchandise featuring all seven members, including Heeseung. This is separate from the March 10 merchandise incident. This is a second documented instance of Belift releasing OT7 commercial content after the departure had already been publicly announced. The same entity that removed him from group activities is simultaneously profiting from his image. Source: Sportskeeda March 13, 2026."}, {"id": "ARG 13", "updatedLabel": "New March 15", "title": "Heeseung still being sold as an ENHYPEN member for commercial events while erased from content", "verdict": "Erased from content. Still sold commercially. Multiple events after departure.", "status": "unresolved", "body": "YZY fansign listed Heeseung as a purchasable ENHYPEN option after departure. March 19: new fancall listed \"ENHYPEN / Heeseung\" — his name separate from the group but attached to an ENHYPEN album event. March 21: ted. It was canceled two days before the event. That is the departure date of the decision, not March 10 when the announcement was made, and certainly not weeks or months before when Belift claims deliberation was underway. Source: Korea Herald March 15, 2026."}, {"id": "ARG 16", "updatedLabel": "New March 17", "title": "Jay's comment on a post featuring Heeseung was deleted almost immediately — documented by Koreaboo", "verdict": "Comment deleted in real time. Pattern of active content restrictions on members.", "status": "unresolved", "body": "On March 16-17, member Jay commented \"AI detected\" on a Weverse post that included a photo of Heeseung. The comment was deleted almost immediately. Koreaboo documented the incident, with multiple fan accounts capturing the comment before deletion. This is the second documented instance of a member appearing to reference Heeseung in a public-facing space and that reference being removed rapidly. A company overseeing a smooth, consensual transition does not require active real-time deletion of member comments referencing the departing artist. Source: Koreaboo March 17, 2026."}], "timeline": [{"date": "Nov 30, 2020", "type": "official", "title": "ENHYPEN debuts — 7 members, intact roster", "body": "ENHYPEN officially debuts under Belift Lab. Heeseung is the oldest member. This lineup remains intact for over five years with zero changes."}, {"date": "Late 2025", "type": "official", "title": "Walk the Line World Tour — includes Coachella debut", "body": "All seven members complete the Walk the Line World Tour including a landmark Coachella debut performance."}, {"date": "Jan 14, 2026", "type": "official", "title": "The Sin: Vanish debuts No. 2 Billboard 200", "body": "ENHYPEN's seventh mini-album debuts at No. 2 on the Billboard 200 with 122,000 units — their highest US chart position ever. Spotify first-week streams: 39.7 million. Source: Hollywood Reporter, Korea Times."}, {"date": "Jan 14, 2026", "type": "official", "title": "Jungwon: \"Contract renewal discussions haven't happened yet\"", "body": "Leader Jungwon states: \"There haven't been any discussions yet. We'll do our best to ensure a good outcome for ENGENEs.\" Contracts run until November 2027. Source: Koreaboo January 16, 2026."}, {"date": "Feb 11, 2026", "type": "official", "title": "D Awards — Heeseung receives first major solo award", "body": "Heeseung receives the UPICK Global Choice (Male) award — his first major solo trophy, earned through 1.4 billion fan votes. In his acceptance speech: \"Until now, I've always had the members by my side, so receiving congratulations on my own like this makes me feel very nervous.\" This is 27 days before the departure announcement. Source: kpopworld.com."}, {"date": "Early Mar 2026", "type": "public", "title": "Sunghoon confirms upcoming 2026 tour via Teen Vogue", "body": "\"We have an upcoming tour and also other activities that are lying ahead of us.\" — Sunghoon. Made with full group participation assumed. Source: Teen Vogue."}, {"date": "Mar 8, 2026", "type": "contradiction", "title": "Heeseung publicly discusses returning to Europe with ENHYPEN — 2 days before announcement", "body": "If deliberation had concluded, Heeseung discussed future tour plans while knowing he was about to leave. If it hadn't, there was no extensive deliberation. One of these must be true."}, {"date": "Mar 10, 2026", "type": "contradiction", "title": "OT7 merchandise scheduled 5:00 PM KST — pulled 40 minutes after departure notice", "body": "ENHYPEN World publishes OT7 merch announcement for 5PM KST open. Forty minutes after the departure notice, it is \"inevitably changed\" and rescheduled. Source: kpopworld.com March 10, 2026."}, {"date": "Mar 10, 2026", "type": "official", "title": "Belift Lab announces Heeseung's departure", "body": "Statement cites \"distinct musical vision\" and \"extensive deliberation.\" No health reason. No timeline. No answer to why parallel solo was impossible. Four independent translations of Heeseung's letter all attribute direction to company."}, {"date": "Mar 11, 2026", "type": "contradiction", "title": "Jake confirms choreography urgently restructured — live Australian TV", "body": "\"There's been a bit of changes in the choreo with the formation, all that. So we've been practicing a lot.\" — Jake, The Morning Show Australia. Billboard also confirms Jake and Jay did not discuss Heeseung's departure at all during the interview. Source: Billboard March 12."}, {"date": "Mar 12, 2026", "type": "contradiction", "title": "En-O'Clock suspended — \"will return in April with better content\"", "body": "Pre-recorded content requires weeks of advance filming. Suspension confirms Heeseung was still being filmed close enough to the announcement that completed episodes cannot be released."}, {"date": "Mar 13, 2026", "type": "contradiction", "title": "OT7 merchandise released AGAIN — three days after departure", "body": "Second documented OT7 merchandise release after the departure announcement. Heeseung's image still being used commercially while being removed from all group content. Source: Sportskeeda March 13."}, {"date": "Mar 14, 2026", "type": "contradiction", "title": "Melbourne — Heeseung absent just 4 days after announcement", "body": "Concert promoter Applewood officially confirms Heeseung will not perform. He was reportedly expected to travel with the group until days before the announcement."}, {"date": "Mar 15, 2026", "type": "official", "title": "Belift reaffirms to Korea Herald — first reason given for parallel solo impossibility", "body": "\"Enhypen's schedule remains extremely demanding throughout the year.\" Answer came 5 days after Billboard asked the same question. Korea Herald confirms Melbourne flight canceled ~March 12 via named source Shivani Srinivasan. Source: Korea Herald March 15, 2026."}, {"date": "Mar 16–17, 2026", "type": "contradiction", "title": "Jay's Weverse comment on Heeseung post deleted in real time", "body": " views, or documented public events. The OT7 merch timing, the En-O'Clock suspension, the Melbourne schedule disruption, the Billboard non-answer, the passive language in Heeseung's letter — these are documented facts, not fan theories. Speculation is claiming to know what happened. This site does not make that claim. It claims Belift's statement doesn't match what the public record shows."}, {"q": "Didn't Belift give a reason on March 15? Isn't this resolved?", "a": "Partially. The March 15 Korea Herald statement is the first time Belift addressed why the parallel solo model was structurally impossible. That partial resolution is acknowledged and documented here. What is not resolved: why the answer took 5 days and a direct press inquiry to produce; why Billboard's same question on March 11 received a non-answer; why the Melbourne flight was booked and then canceled two days before the event. The March 15 statement addresses 1 of 16 documented contradictions."}, {"q": "Maybe they kept it vague to protect his privacy?", "a": "Privacy protection does not explain the refusal to answer a structural business question. Billboard's question — why was the parallel model structurally impossible — has nothing to do with Heeseung's personal life. It's a question about business structure. On March 15, Belift gave the answer: \"Enhypen's schedule remains extremely demanding.\" That answer is not privacy-sensitive. It was available March 10. It was not provided."}, {"q": "He could have been unhappy and chosen this for his wellbeing", "a": "True — and no one here disputes that. Heeseung's potential unhappiness or burnout is acknowledged as a real possibility. The argument is not \"he was successful so he must have been happy.\" The argument is: if health or burnout was the reason, Belift had industry-validated ways to communicate that without disclosing private medical information. They did not use them. The word 'health' does not appear anywhere in their statement."}, {"q": "'Suggested' is not the same as 'ordered.' He could have chosen to follow the suggestion.", "a": "True — suggestion is not a command, and no one here claims otherwise. The argument is narrower: Belift's official statement frames this as Heeseung's own artistic decision. His letter — in four independent translations — says he followed a direction the company suggested. That is a contradiction between two official documents, regardless of whether 'suggested' implies coercion or not."}, {"q": "What about the March 18 NPS disruption?", "a": "On March 18, NPS chairman Kim Sung-joo confirmed that approximately 1,500 emails and international calls temporarily disrupted the NPS International Pension Service Center — a department serving overseas workers and Koreans living abroad. People who genuinely needed pension support could not access services. This site does not endorse this action. It caused direct harm to people unconnected to this situation. NPS confirmed they do not intervene in corporate personnel decisions — the action was also strategically meaningless."}, {"q": "Demanding Heeseung return isn't his choice to make", "a": "Correct. Fans demanding Heeseung's return are overstepping. A person's career decision cannot be reversed by public pressure. This site does not make that demand and does not endorse it. The arguments here are directed at Belift Lab's public statement — not at Heeseung's personal choices."}], "i18n": {"en": {"siteTitle": "THE RECORD", "tagline": "Independent Documentation Project — ENHYPEN / Belift Lab", "nav": {"home": "Home", "case": "The Case", "timeline": "Timeline", "analysis": "Analysis", "sources": "Sources", "faq": "FAQ", "news": "AI News"}, "hero": {"title": "Why Belift Lab's Explanation", "titleEm": "Doesn't Add Up", "sub": "Fact-based, sourced analysis of the public record surrounding Heeseung's departure from ENHYPEN on March 10, 2026. No speculation. No rumors. No unverified claims."}, "counters": {"args": "Documented contradictions", "   ].map(function(r,i){return'<div class="analysis-item"><span class="status-badge '+(r.s==='unresolved'?'badge-unresolved':'badge-partial')+'">'+r.l+'</span><div class="analysis-claim"><div class="analysis-claim-label">Excerpt '+(i+1)+'</div><div class="analysis-claim-text">'+r.ex+'</div></div><div class="analysis-row"><div class="analysis-col"><div class="analysis-col-label">Claim</div><div class="analysis-col-body">'+r.cl+'</div></div><div class="analysis-col"><div class="analysis-col-label">Evidence</div><div class="analysis-col-body">'+r.ev+'</div></div><div class="analysis-col"><div class="analysis-col-label">Assessment</div><div class="analysis-col-body '+(r.s==='unresolved'?'assessment-inconsistent':'assessment-unanswered')+'">'+r.as+'</div></div></div></div>';}).join('');
  return PH('Page 03','Claim. Evidence.','Assessment.','Each excerpt from Belift\'s official statement evaluated against the documented public record.','ANALYSIS')
    +'<div class="page-content-wrap"><div class="page-section">'+rows+'</div></div>';
}
function sourcesPg(){
  var cats=[];D.sources.forEach(function(s){if(cats.indexOf(s.category)<0)cats.push(s.category);});
  var html=cats.map(function(c){return'<div class="source-category"><div class="source-category-title">'+c+'</div>'+D.sources.filter(function(s){return s.category===c;}).map(function(s){return'<div class="source-item"><div class="source-id">'+s.id+'</div><div><div class="source-title">'+s.title+'</div><div class="source-meta">'+s.outlet+'</div><div class="source-note">'+s.note+'</div><a href="'+s.url+'" class="source-link" target="_blank" rel="noopener">\u2192 View source</a></div></div>';}).join('')+'</div>';}).join('');
  return PH('Page 04','51 Verified','Sources','Every citation is publicly available and linked. No anonymous sources.','SOURCES')
    +'<div class="page-content-wrap"><div class="page-section">'+html+'</div></div>';
}
function faqPg(){

  return PH('Page 05',"How We Argue,","What We Can't Conclude",'Evidence selection, uncertainty handling, and responses to common objections.','FAQ')

window.tArg=function(i){document.getElementById('arg'+i).classList.toggle('open');};
window.tFaq=function(i){
  var x=document.getElementById('fq'+i),ico=document.getElementById('fi'+i),was=x.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(function(e){e.classList.remove('open');});
  document.querySelectorAll('.faq-icon').forEach(function(e){e.textContent='\u002b';});
  if(!was){x.classList.add('open');ico.textContent='\u00d7';}
};
window.cpArg=function(i){
  var a=D.arguments[i];
  navigator.clipboard.writeText(a.id+': '+a.title+'\n\n'+a.verdict+'\n\nSource: '+window.location.href).then(function(){
    var b=document.getElementById('cp'+i);if(b){b.textContent='\u2713 Copied';setTimeout(function(){b.textContent='\u2398 Copy';},2000);}
  });
};
window.dlCard=function(i){
  var a=D.arguments[i],c=document.createElement('canvas');c.width=1080;c.height=1080;
  var ctx=c.getContext('2d');ctx.fillStyle='#0a0a0b';ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle='#c0392b';ctx.fillRect(0,0,1080,6);
  ctx.fillStyle='#7a7470';ctx.font='14px monospace';ctx.fillText('THE RECORD \u2014 BELIFT STATEMENT ANALYSIS',80,90);
  ctx.fillStyle='#c0392b';ctx.font='italic 500 22px Georgia,serif';ctx.fillText(a.id,80,160);
  ctx.fillStyle='#f0ebe3';ctx.font='bold italic 46px Georgia,serif';
  var words=a.title.split(' '),line='',y=270;
  words.forEach(function(w){var t=line+w+' ';if(ctx.measureText(t).width>920&&line){ctx.fillText(line,80,y);line=w+' ';y+=60;}else line=t;});
  ctx.fillText(line,80,y);y+=76;ctx.fillStyle='#c0392b';ctx.fillRect(80,y,120,2);y+=32;
  ctx.fillStyle='#8a8480';ctx.font='22px monospace';ctx.fillText(a.verdict,80,y);
  ctx.fillStyle='#c0392b';ctx.font='16px monospace';ctx.fillText('please-be-safe.github.io/belift-statement-analysis',80,1024);
  var el=document.createElement('a');el.download='the-record-'+a.id.replace(/\s+/g,'-').toLowerCase()+'.png';el.href=c.toDataURL();el.click();
};
window.doSearch=async function(){
  var key=document.getElementById('nk').value.trim(),btn=document.getElementById('nb'),
    ne=document.getElementById('ne'),nr=document.getElementById('nr'),tk=T();
  if(!key){ne.textContent='Please enter your Anthropic API key.';ne.style.display='block';return;}
  ne.style.display='none';nr.style.display='none';btn.disabled=true;btn.textContent=tk.searching;
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-5-20251001',max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:'Neutral news monitor. Today is March 22, 2026. Search for latest news about Heeseung, ENHYPEN, Belift Lab. Return neutral bullet points, most recent first, with source names.',
        messages:[{role:'user',content:'Search for latest news about Heeseung ENHYPEN Belift Lab in the past 48 hours.'}]})});
    if(!r.ok){var e=await r.json();throw new Error(e.error&&e.error.message||'Error '+r.status);}
    var d=await r.json();
    nr.textContent=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n')||'No results.';
    nr.style.display='block';
  }catch(e){ne.textContent='Error: '+e.message;ne.style.display='block';}
  finally{btn.disabled=false;btn.textContent=tk.searchBtn;}
};
window.setLang=function(l){lang=l;document.documentElement.lang=l;render();};

  }
}
