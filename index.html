  border-collapse: collapse;
  margin-top: 8px;
  max-width: 720px;
}

.comparison-table th {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 18px;
  text-align: left;
  border-bottom: 2px solid var(--border-light);
}

.comparison-table th:first-child { color: var(--gray-light); }
.comparison-table th:last-child { color: var(--red-light); }

.comparison-table td {
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.65;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.comparison-table tr:last-child td { border-bottom: none; }

.comparison-table td:first-child {
  color: var(--text);
  font-style: italic;
  width: 42%;
}

.comparison-table td:last-child {
  color: #e05a4a;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
}

.comparison-table tr:hover td {
  background: rgba(255,255,255,0.02);
}

/* ===== LATEST UPDATES ===== */
.updates-list {
  display: flex;
  flex-direction: column;
  max-width: 720px;
}

.update-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.update-item:first-child { border-top: 1px solid var(--border); }

.update-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--red-light);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.update-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
}

.update-tag {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 2px 8px;
  margin-left: 8px;
  vertical-align: middle;
  border: 1px solid var(--red);
  color: var(--red-light);
  background: rgba(181,41,28,0.1);
}

/* ===== ANIMATED COUNTER ===== */
@keyframes countUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.counter-num {
  animation: countUp 0.7s ease forwards;
}

.counter-item:nth-child(1) .counter-num { animation-delay: 0.1s; opacity: 0; }
.counter-item:nth-child(2) .counter-num { animation-delay: 0.25s; opacity: 0; }
.counter-item:nth-child(3) .counter-num { animation-delay: 0.4s; opacity: 0; }
.counter-item:nth-child(4) .counter-num { animation-delay: 0.55s; opacity: 0; }

/* ===== CONCLUSION BOX ===== */
.conclusion-box {
  background: rgba(181,41,28,0.06);
  border: 1px solid rgba(181,41,28,0.25);
  padding: 36px 40px;
  margin-top: 48px;
  max-width: 720px;
}

.conclusion-box-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red-light);
  margin-bottom: 16px;
}

.conclusion-box-text {
  font-size: 18px;
  color: var(--off-white);
  line-height: 1.75;
}

/* ===== SHARE BUTTON ===== */
.share-bar {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 200;
}

.share-btn {
  background: var(--red);
  color: white;
  border: none;
  padding: 14px 26px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(181,41,28,0.4);
}

.share-btn:hover {
  background: var(--red-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(181,41,28,0.5);
}

.share-toast {
  position: fixed;
  bottom: 84px;
  right: 28px;
  background: var(--gray-dark);
  border: 1px solid var(--border-light);
  padding: 12px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--off-white);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  letter-spacing: 0.05em;
}

.share-toast.show { opacity: 1; }

/* ===== PAGE LAYOUT ===== */
.page-content-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 48px;
}

.page-section {
  padding: 64px 0;
  border-bottom: 1px solid var(--border);
}

.page-section:last-child { border-bottom: none; }

.page-section-header {
  margin-bottom: 40px;
}

.page-section-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--off-white);
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}

.page-section-header p {
  font-size: 15px;
  color: var(--gray-light);
  max-width: 640px;
}

/* ===== FOOTER ===== */
.sitefooter {
  border-top: 1px solid var(--border-light);
  padding: 32px 48px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 32px;
  margin-top: 80px;
  background: var(--gray-dark);
}

.footer-note {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--gray);
  letter-spacing: 0.05em;
  line-height: 1.8;
  max-width: 560px;
}

.footer-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--gray);
  white-space: nowrap;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .topbar, .sitenav, .hero, .page-hero, .sitefooter { padding-left: 24px; padding-right: 24px; }
  .content-wrap, .page-content-wrap { padding: 0 24px; }
  .content-section { grid-template-columns: 1fr; gap: 20px; }
  .counter-strip { grid-template-columns: repeat(2, 1fr); }
  .counter-item { padding: 28px 24px; }
  .counter-item:nth-child(2) { border-right: none; }
  .counter-item:nth-child(3) { border-top: 1px solid var(--border-light); }
  .counter-item:nth-child(4) { border-top: 1px solid var(--border-light); border-right: none; }
  .argument-body { padding-left: 0; }
  .analysis-row { grid-template-columns: 1fr; }
  .source-item { grid-template-columns: 48px 1fr; }
  .nav-links { display: none; }
  h1 { font-size: 36px; }
  .hero-bg-text, .page-hero-bg { display: none; }
  .page-nav-item { grid-template-columns: 36px 1fr 24px; }
  .smoking-gun { padding: 28px 20px; }
  .home-smoking-gun { padding: 24px 20px; }
  .share-bar { bottom: 16px; right: 16px; }
  .comparison-table { font-size: 13px; }
  .comparison-table td, .comparison-table th { padding: 12px 12px; }
}

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'Source Serif 4', Georgia, serif;
  font-weight: 300;
  font-size: 17px;
  line-height: 1.8;
  min-height: 100vh;
}

/* ===== TOPBAR ===== */
.topbar {
  background: var(--red);
  padding: 8px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ===== NAV ===== */
.sitenav {
  background: var(--black);
  border-bottom: 1px solid var(--border-light);
  padding: 0 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: var(--off-white);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 32px;
}

.nav-links a {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-light);
  text-decoration: none;
  transition: color 0.2s;
}

.nav-links a:hover,
.nav-links a.active { color: var(--off-white); }

/* ===== HERO ===== */
.hero {
  border-bottom: 1px solid var(--border-light);
  padding: 80px 48px 72px;
  position: relative;
  overflow: hidden;
}

.hero-inner { position: relative; z-index: 2; max-width: 900px; }

.hero-bg-text {
  position: absolute;
  right: -40px;
  bottom: -40px;
  font-family: 'Playfair Display', serif;
  font-size: 220px;
  font-weight: 900;
  color: rgba(255,255,255,0.025);
  line-height: 1;
  pointer-events: none;
  user-select: none;
  letter-spacing: -8px;
}

.site-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red-light);
  margin-bottom: 28px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(38px, 5.5vw, 76px);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -2px;
  color: var(--off-white);
  margin-bottom: 28px;
}

h1 em {
  font-style: italic;
  color: var(--gray-light);
}

.header-sub {
  font-size: 16px;
  color: var(--gray-light);
  font-family: 'Source Serif 4', serif;
  font-weight: 300;
  max-width: 680px;
  line-height: 1.7;
}

/* ===== COUNTER STRIP ===== */
.counter-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border-light);
}

.counter-item {
  padding: 36px 48px;
  border-right: 1px solid var(--border-light);
  text-align: left;
}

.counter-item:last-child { border-right: none; }

.counter-num {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 900;
  color: var(--red-light);
  line-height: 1;
  letter-spacing: -2px;
}

.counter-label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--gray-light);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 10px;
}

/* ===== CONTENT ===== */
.content-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 48px;
}

.content-section {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 64px;
  padding: 64px 0;
  border-bottom: 1px solid var(--border);
}

.content-section:last-child { border-bottom: none; }

.section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red-light);
  padding-top: 6px;
}

.section-body h2 {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--off-white);
  letter-spacing: -0.5px;
  margin-bottom: 24px;
  line-height: 1.2;
}

.section-body p {
  color: var(--text);
  margin-bottom: 20px;
  max-width: 700px;
}

/* ===== THESIS BLOCK ===== */
.thesis-block {
  border-left: 3px solid var(--red);
  padding: 20px 32px;
  font-size: 20px;
  font-weight: 300;
  line-height: 1.75;
  color: var(--off-white);
  max-width: 720px;
  font-style: normal;
}

/* ===== EVIDENCE GRID ===== */
.evidence-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 28px;
  max-width: 700px;
}

.evidence-item {
  background: var(--gray-dark);
  border: 1px solid var(--border-light);
  padding: 14px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text);
  letter-spacing: 0.03em;
}

/* ===== SCOPE LIST ===== */
.scope-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 680px;
  margin-bottom: 24px;
}

.scope-list li {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  font-size: 16px;
  color: var(--text);
}

.scope-list li::before {
  content: "—";
  color: var(--red-light);
  font-family: 'IBM Plex Mono', monospace;
  flex-shrink: 0;
}

.scope-note {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--gray-light);
  max-width: 640px;
  line-height: 1.7;
  border-top: 1px solid var(--border-light);
  padding-top: 20px;
  margin-top: 4px;
}

/* ===== PAGE NAV LIST ===== */
.page-nav-list {
  display: flex;
  flex-direction: column;
}

.page-nav-item {
  display: grid;
  grid-template-columns: 48px 1fr 32px;
  align-items: center;
  gap: 24px;
  padding: 24px 0;
  border-top: 1px solid var(--border-light);
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s ease;
}

.page-nav-item:last-child { border-bottom: 1px solid var(--border-light); }

.page-nav-item:hover { padding-left: 12px; background: rgba(255,255,255,0.02); }
.page-nav-item:hover .page-nav-num { color: var(--red-light); }
.page-nav-item:hover .page-nav-arrow { color: var(--red-light); }

.page-nav-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--gray);
  letter-spacing: 0.1em;
  transition: color 0.2s;
}

.page-nav-title {
  font-family: 'Playfair Display', serif;
  font-size: 21px;
  font-weight: 700;
  color: var(--off-white);
  margin-bottom: 4px;
}

.page-nav-desc {
  font-size: 13px;
  color: var(--gray-light);
  font-family: 'IBM Plex Mono', monospace;
}

.page-nav-arrow {
  font-size: 20px;
  color: var(--gray);
  transition: color 0.2s;
}

/* ===== ARGUMENT CARDS ===== */
.argument-list { display: flex; flex-direction: column; gap: 0; }

.argument {
  border-top: 1px solid var(--border-light);
  padding: 40px 0;
}

.argument:last-child { border-bottom: 1px solid var(--border-light); }

.argument-header {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 20px;
}

.argument-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--red-light);
  letter-spacing: 0.1em;
  padding-top: 6px;
  flex-shrink: 0;
  min-width: 48px;
}

.argument-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--off-white);
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.argument-body {
  padding-left: 68px;
  max-width: 720px;
}

.argument-body p {
  color: var(--text);
  margin-bottom: 16px;
}

.argument-body p:last-child { margin-bottom: 0; }

.argument-quote {
  background: var(--gray-dark);
  border-left: 3px solid var(--red);
  padding: 16px 20px;
  margin: 20px 0;
  font-style: italic;
  font-size: 15px;
  color: var(--off-white);
  line-height: 1.7;
}

.argument-verdict {
  display: inline-block;
  background: rgba(181,41,28,0.15);
  border: 1px solid var(--red);
  padding: 6px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--red-light);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 16px;
}

/* ===== TIMELINE ===== */
.timeline { display: flex; flex-direction: column; }

.timeline-item {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 32px;
  padding: 28px 0;
  border-top: 1px solid var(--border);
  position: relative;
}

.timeline-item:last-child { border-bottom: 1px solid var(--border); }

.timeline-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--red-light);
  letter-spacing: 0.05em;
  padding-top: 3px;
}

.timeline-content-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--off-white);
  margin-bottom: 8px;
}

.timeline-content-body {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
}

.timeline-tag {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  margin-bottom: 10px;
  border: 1px solid;
}

.tag-official { color: #4a9eff; border-color: #4a9eff; background: rgba(74,158,255,0.1); }
.tag-contradiction { color: var(--red-light); border-color: var(--red); background: rgba(181,41,28,0.1); }
.tag-public { color: #5cb85c; border-color: #5cb85c; background: rgba(92,184,92,0.1); }
.tag-commercial { color: #f0ad4e; border-color: #f0ad4e; background: rgba(240,173,78,0.1); }

/* ===== ANALYSIS TABLE ===== */
.analysis-item {
  border-top: 1px solid var(--border-light);
  padding: 40px 0;
}

.analysis-item:last-child { border-bottom: 1px solid var(--border-light); }

.analysis-claim {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-light);
  padding: 20px 24px;
  margin-bottom: 24px;
}

.analysis-claim-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray-light);
  margin-bottom: 10px;
}

.analysis-claim-text {
  font-style: italic;
  color: var(--off-white);
  font-size: 16px;
  line-height: 1.7;
}

.analysis-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 16px;
}

.analysis-col { }

.analysis-col-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray-light);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
}

.analysis-col-body {
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
}

.assessment-inconsistent { color: var(--red-light); }
.assessment-unanswered { color: #f0ad4e; }
.assessment-confirmed { color: #5cb85c; }

/* ===== SOURCES ===== */
.source-category { margin-bottom: 48px; }

.source-category-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red-light);
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 20px;
}

.source-item {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 20px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.source-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--red-light);
  letter-spacing: 0.1em;
}

.source-title {
  font-size: 15px;
  color: var(--off-white);
  margin-bottom: 4px;
  font-weight: 600;
}

.source-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--gray-light);
  margin-bottom: 6px;
}

.source-note {
  font-size: 14px;
  color: var(--text-dim);
}

.source-link {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--red-light);
  text-decoration: none;
  display: inline-block;
  margin-top: 6px;
}

.source-link:hover { text-decoration: underline; }

/* ===== FAQ ===== */
.faq-item {
  border-top: 1px solid var(--border-light);
  padding: 36px 0;
}

.faq-item:last-child { border-bottom: 1px solid var(--border-light); }

.faq-q {
  font-family: 'Playfair Display', serif;
  font-size: 21px;
  font-weight: 700;
  color: var(--off-white);
  margin-bottom: 20px;
  line-height: 1.3;
}

.faq-a {
  font-size: 16px;
  color: var(--text);
  line-height: 1.8;
  max-width: 720px;
}

.faq-a p { margin-bottom: 14px; }
.faq-a p:last-child { margin-bottom: 0; }

/* ===== PAGE HERO (inner pages) ===== */
.page-hero {
  border-bottom: 1px solid var(--border-light);
  padding: 64px 48px 56px;
  position: relative;
  overflow: hidden;
}

.page-hero-inner { position: relative; z-index: 2; }

.page-hero h1 {
  font-size: clamp(32px, 4vw, 60px);
  margin-bottom: 16px;
}

.page-hero-desc {
  font-size: 16px;
  color: var(--gray-light);
  max-width: 600px;
  line-height: 1.7;
}

.page-hero-bg {
  position: absolute;
  right: -20px;
  bottom: -20px;
  font-family: 'Playfair Display', serif;
  font-size: 160px;
  font-weight: 900;
  color: rgba(255,255,255,0.025);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

/* ===== FOOTER ===== */
.sitefooter {

canceled ~March 12 by named source Shivani Srinivasan. One of 16 contradictions partially addressed."}, {"date": "Mar 13, 2026", "tag": null, "text": "OT7 merchandise released again — second documented OT7 commercial release after departure announcement. Source: Sportskeeda."}, {"date": "Mar 12, 2026", "tag": null, "text": "En-O'Clock suspended. Melbourne flight canceled approximately 2 days before the event."}, {"date": "Mar 11, 2026", "tag": null, "text": "Jake confirms choreography urgently restructured on live Australian TV (The Morning Show). Neither Jake nor Jay discussed Heeseung's departure. Source: Billboard."}, {"date": "Mar 10, 2026", "tag": null, "text": "Heeseung's departure announced. OT7 merchandise scheduled 5:00 PM KST, pulled 40 minutes after notice. Four independent letter translations all attribute direction to company."}], "arguments": [{"id": "ARG 01", "title": "Belift's statement is self-defeating in a single paragraph", "verdict": "Internally inconsistent", "status": "unresolved", "body": "Belift's own statement reads: \"It's difficult to relay the whole process through a short notice, but this decision comes after extensive deliberation.\" If the deliberation was genuinely extensive — prolonged, substantive, carefully considered — then the company had ample time to prepare a comprehensive statement. No external force required the short notice format. HYBE is South Korea's third-largest entertainment conglomerate with a professional PR infrastructure. \"It's difficult to relay the whole process\" is not an acknowledgment of complexity. It is an acknowledgment of concealment. These two claims — extensive deliberation, insufficient time to explain — cannot both be true when the same party controls both the timeline and the platform."}, {"id": "ARG 02", "title": "A contract with 20 months remaining — and no explanation for why it was broken", "verdict": "No precedent. No explanation.", "status": "unresolved", "body": "Heeseung's exclusive contract with Belift Lab runs until November 2027 — approximately 20 months from the date of announcement. Belift confirmed the departure has nothing to do with contract renewal. In the K-pop industry, mid-contract departures occur under three documented circumstances: health crises, irreconcilable internal conflict, or forced restructuring by the company. Belift formally ruled out all three. This is the first lineup change since ENHYPEN's debut in November 2020 — over five years of an intact roster. No industry precedent supports a voluntary mid-contract departure under the circumstances Belift has described."}, {"id": "ARG 03", "title": "Billboard asked a direct causal question — Belift did not answer it", "verdict": "Direct question. Non-answer on record.", "status": "partial", "body": "When Billboard asked directly why Heeseung could not pursue solo activities while remaining in ENHYPEN — citing BTS and BLACKPINK members as precedent — Belift's full response was: \"We concluded that allowing HEESEUNG to focus fully on his career as a solo artist, rather than pursuing solo activities within the team, would be the most fulfilling approach for both ENHYPEN and HEESEUNG.\" The question: Why was the parallel model structurally impossible? The answer: We decided not being parallel was best. That is not an answer. TXT's Yeonjun pursues solo activities while remaining a full member of TXT under HYBE itself. On March 15, Belift finally gave a reason: \"Enhypen's schedule remains extremely demanding throughout the year.\" That answer took 5 days and a press inquiry to produce."}, {"id": "ARG 04", "title": "Heeseung's own letter does not use the language of a self-initiated decision", "verdict": "Passive framing. Direction originated externally.", "status": "unresolved", "body": "Four independent translations of the same Weverse post. HYBE official (Billboard): \"I ultimately made a big decision in line with the direction that was discussed.\" Manila Bulletin: \"I've made the bold decision to follow the direction the company has suggested.\" StarNews Korea: \"depending on the direction the company suggested.\" Rolling Stone Australia: \"according to the direction the company suggested.\" None constitute the language of independent, self-originated agency. The standard for voluntary K-pop departure statements is consistent: \"I decided,\" \"I wanted,\" \"I chose.\" Heeseung's letter uses none of these. It says the direction existed before him and he followed it."}, {"id": "ARG 05", "title": "En-O'Clock — the single most damaging piece of material evidence", "verdict": "Production continued past the alleged decision point.", "status": "unresolved", "body": "On March 12, Belift Lab announced that En-O'Clock — a weekly pre-recorded variety series — would be \"temporarily suspended\" and would \"return in April with better content.\" En-O'Clock is pre-recorded and pre-edited content. It cannot air weekly without being filmed at least several weeks in advance. This means: as of March 10, Belift was holding completed episodes featuring Heeseung that they cannot now release. The suspension was necessary because those episodes must be re-edited or re-filmed to remove him. If this departure was the product of extensive, long-running deliberation — why was content still being filmed with Heeseung close enough to the announcement date that its release is now impossible? There is only one answer: the decision arrived too late to halt production in time."}, {"id": "ARG 06", "title": "OT7 merchandise was released and pulled on the same day as the announcement", "verdict": "OT7 merch on departure day. Irreconcilable with advance planning.", "status": "unresolved", "body": "On March 10, ENHYPEN World published an announcement for new official merchandise scheduled to open at 5:00 PM KST featuring all seven members including Heeseung. Forty minutes after the departure notice went live, ENHYPEN World posted again: the launch had been \"inevitably changed.\" A company that spent months carefully planning a founding member's departure does not schedule OT7 merchandise to open at 5:00 PM KST on the same day as the announcement. The merchandise was not pre-pulled before the announcement. It was publicly scheduled, then retracted forty minutes after the departure notice. Source: kpopworld.com March 10, 2026."}, {"id": "ARG 07", "title": "The commercial timing paradox has no coherent solution", "verdict": "Two-day gap. One of two scenarios — both damaging.", "status": "unresolved", "body": "ENHYPEN released The Sin: Vanish in January 2026, debuted at Coachella, and completed the Walk the Line World Tour. Sunghoon publicly confirmed upcoming tour activity for 2026. On March 8 — two days before the announcement — Heeseung himself publicly discussed plans to return to Europe with the group. The logic is binding: if deliberation had already concluded before March 10, Heeseung discussed future tour dates knowing he was about to leave. That is direct misrepresentation to the public. If deliberation had not yet concluded as of March 8, then the announcement was not the product of extensive deliberation. One of these must be true. Both cannot be."}, {"id": "ARG 08", "title": "Melbourne and choreography confirm the departure was abrupt", "verdict": "International schedule disrupted four days out.", "status": "unresolved", "body": "ENHYPEN was scheduled to headline an event in Melbourne on March 14 — four days after the announcement. Concert promoter Applewood officially confirmed Heeseung would not be performing. Multiple sources reported he was expected to travel with the group until days before the announcement. Additionally, member Jake confirmed on live Australian TV that stage choreography had been recently reorganized — meaning formations were still being built around seven members close enough to the announcement that they required urgent restructuring afterward. A departure planned months in advance does not result in a member being pulled from international travel four days out."}, {"id": "ARG 09", "title": "El Capitxn found out from the news — not from Heeseung or Belift", "verdict": "Close collaborator. Zero advance notice.", "status": "unresolved", "body": "El Capitxn, a producer with a direct professional working relationship to Heeseung, publicly acknowledged: \"I couldn't get in contact with him, so I first learned about it from the news.\" Belift claims the decision involved extensive deliberation with many people over a long period. A person with a direct professional relationship to the departing artist found out the same way fans did — from a public announcement. This is consistent with a decision that was not widely communicated in advance, which is inconsistent with extensive, long-running deliberation involving many people."}, {"id": "ARG 10", "title": "2 million signatures is not \"mixed reactions\"", "verdict": "Documented mischaracterization of public response.", "status": "unresolved", "body": "Within 72 hours of the announcement, a Change.org petition surpassed 1.6 million signatures from dozens of countries. The petition closed at 2,084,798 signatures. Over 18 protest trucks were deployed outside HYBE headquarters. Fans from Singapore organized consecutive days of demonstrations. Belift's statement: \"We understand that this news is a lot to process and may be received with mixed reactions.\" 2 million signatures moving in one direction is not mixed reactions. It is a unified, cross-continental response. Describing this scale of response as \"mixed\" is itself a documented mischaracterization of the public record."}, {"id": "ARG 11", "updatedLabel": "Updated March 15", "title": "Jake confirmed choreography restructuring on live television — and neither member discussed Heeseung at all", "verdict": "Member-confirmed on live TV. Departure not discussed. Both documented by Billboard.", "status": "unresolved", "body": "On March 11, Jake and Jay appeared on Australia's The Morning Show. Billboard: \"There's been a bit of changes in the choreo with the formation, all that. So we've been practicing a lot.\" SE7EN.ws: \"There have been significant adjustments to our choreography and stage formations to prepare for the Hello Melbourne festival.\" Both versions confirm the same documented fact: stage formations were being actively restructured after the departure announcement. A departure planned months in advance does not require urgent formation changes days before an international performance. Billboard also confirmed that Jake and Jay \"did not discuss\" Heeseung's departure during the interview at all — despite it being the single most significant thing to happen to the group in five years."}, {"id": "ARG 12", "updatedLabel": "Updated March 15", "title": "OT7 merchandise released on March 13 — three days after the departure announcement", "verdict": "OT7 merch on March 10. OT7 merch again on March 13. Both after announcement.", "status": "unresolved", "body": "On March 13, 2026 — three days after Heeseung's departure was announced — ENHYPEN World released new official merchandise featuring all seven members, including Heeseung. This is separate from the March 10 merchandise incident. This is a second documented instance of Belift releasing OT7 commercial content after the departure had already been publicly announced. The same entity that removed him from group activities is simultaneously profiting from his image. Source: Sportskeeda March 13, 2026."}, {"id": "ARG 13", "updatedLabel": "New March 15", "title": "Heeseung still being sold as an ENHYPEN member for commercial events while erased from content", "verdict": "Erased from content. Still sold commercially. Multiple events after departure.", "status": "unresolved", "body": "YZY fansign listed Heeseung as a purchasable ENHYPEN option after departure. March 19: new fancall listed \"ENHYPEN / Heeseung\" — his name separate from the group but attached to an ENHYPEN album event. March 21: Shanghai in-person fansign canceled after being sold. March 22: Yizhiyu Fan Call R4 at 8PM KST — first scheduled post-departure fan interaction, still listed as \"ENHYPEN / Heeseung.\" The same institution that removed him from group content continues to exploit his ENHYPEN association for commercial events."}, {"id": "ARG 14", "updatedLabel": "New March 15", "title": "Belift reaffirms on March 15 — and finally gives a reason for the first time. It still doesn't hold up.", "verdict": "First real reason given. Five days late. Still incomplete.", "status": "partial", "body": "On March 15, Belift told The Korea Herald: \"Heeseung will not be returning to Enhypen. He has a clear artistic direction he wants to pursue, and we decided to respect that.\" First reason given for why parallel solo was impossible: \"Enhypen's schedule remains extremely demanding throughout the year, making it difficult for members to develop independent musical projects while maintaining full group activities.\" This answer was available on March 10 when Billboard asked directly. They did not give it. The answer also does not explain why a reduced group schedule — the solution HYBE used for BTS — was not considered. Source: Korea Herald March 15, 2026."}, {"id": "ARG 15", "updatedLabel": "New March 15", "title": "Heeseung's flight to Melbourne was canceled only two days before the event — confirmed by Korea Herald", "verdict": "Flight booked. Canceled March 12. Departure decision was not made months in advance.", "status": "unresolved", "body": "The Korea Herald, in its March 15 article, documents that Heeseung's flight ticket for the Melbourne Music Festival was canceled only two days before the event — on approximately March 12. This is reported by The Korea Herald citing a named source: Shivani Srinivasan. If Heeseung's departure was the product of extensive deliberation concluded well before March 10 — his flight to Melbourne would never have been booked in the first place. The flight existed. It was canceled two days before the event. That is the departure date of the decision, not March 10 when the announcement was made, and certainly not weeks or months before when Belift claims deliberation was underway. Source: Korea Herald March 15, 2026."}, {"id": "ARG 16", "updatedLabel": "New March 17", "title": "Jay's comment on a post featuring Heeseung was deleted almost immediately — documented by Koreaboo", "verdict": "Comment deleted in real time. Pattern of active content restrictions on members.", "status": "unresolved", "body": "On March 16-17, member Jay commented \"AI detected\" on a Weverse post that included a photo of Heeseung. The comment was deleted almost immediately. Koreaboo documented the incident, with multiple fan accounts capturing the comment before deletion. This is the second documented instance of a member appearing to reference Heeseung in a public-facing space and that reference being removed rapidly. A company overseeing a smooth, consensual transition does not require active real-time deletion of member comments referencing the departing artist. Source: Koreaboo March 17, 2026."}], "timeline": [{"date": "Nov 30, 2020", "type": "official", "title": "ENHYPEN debuts — 7 members, intact roster", "body": "ENHYPEN officially debuts under Belift Lab. Heeseung is the oldest member. This lineup remains intact for over five years with zero changes."}, {"date": "Late 2025", "type": "official", "title": "Walk the Line World Tour — includes Coachella debut", "body": "All seven members complete the Walk the Line World Tour including a landmark Coachella debut performance."}, {"date": "Jan 14, 2026", "type": "official", "title": "The Sin: Vanish debuts No. 2 Billboard 200", "body": "ENHYPEN's seventh mini-album debuts at No. 2 on the Billboard 200 with 122,000 units — their highest US chart position ever. Spotify first-week streams: 39.7 million. Source: Hollywood Reporter, Korea Times."}, {"date": "Jan 14, 2026", "type": "official", "title": "Jungwon: \"Contract renewal discussions haven't happened yet\"", "body": "Leader Jungwon states: \"There haven't been any discussions yet. We'll do our best to ensure a good outcome for ENGENEs.\" Contracts run until November 2027. Source: Koreaboo January 16, 2026."}, {"date": "Feb 11, 2026", "type": "official", "title": "D Awards — Heeseung receives first major solo award", "body": "Heeseung receives the UPICK Global Choice (Male) award — his first major solo trophy, earned through 1.4 billion fan votes. In his acceptance speech: \"Until now, I've always had the members by my side, so receiving congratulations on my own like this makes me feel very nervous.\" This is 27 days before the departure announcement. Source: kpopworld.com."}, {"date": "Early Mar 2026", "type": "public", "title": "Sunghoon confirms upcoming 2026 tour via Teen Vogue", "body": "\"We have an upcoming tour and also other activities that are lying ahead of us.\" — Sunghoon. Made with full group participation assumed. Source: Teen Vogue."}, {"date": "Mar 8, 2026", "type": "contradiction", "title": "Heeseung publicly discusses returning to Europe with ENHYPEN — 2 days before announcement", "body": "If deliberation had concluded, Heeseung discussed future tour plans while knowing he was about to leave. If it hadn't, there was no extensive deliberation. One of these must be true."}, {"date": "Mar 10, 2026", "type": "contradiction", "title": "OT7 merchandise scheduled 5:00 PM KST — pulled 40 minutes after departure notice", "body": "ENHYPEN World publishes OT7 merch announcement for 5PM KST open. Forty minutes after the departure notice, it is \"inevitably changed\" and rescheduled. Source: kpopworld.com March 10, 2026."}, {"date": "Mar 10, 2026", "type": "official", "title": "Belift Lab announces Heeseung's departure", "body": "Statement cites \"distinct musical vision\" and \"extensive deliberation.\" No health reason. No timeline. No answer to why parallel solo was impossible. Four independent translations of Heeseung's letter all attribute direction to company."}, {"date": "Mar 11, 2026", "type": "contradiction", "title": "Jake confirms choreography urgently restructured — live Australian TV", "body": "\"There's been a bit of changes in the choreo with the formation, all that. So we've been practicing a lot.\" — Jake, The Morning Show Australia. Billboard also confirms Jake and Jay did not discuss Heeseung's departure at all during the interview. Source: Billboard March 12."}, {"date": "Mar 12, 2026", "type": "contradiction", "title": "En-O'Clock suspended — \"will return in April with better content\"", "body": "Pre-recorded content requires weeks of advance filming. Suspension confirms Heeseung was still being filmed close enough to the announcement that completed episodes cannot be released."}, {"date": "Mar 13, 2026", "type": "contradiction", "title": "OT7 merchandise released AGAIN — three days after departure", "body": "Second documented OT7 merchandise release after the departure announcement. Heeseung's image still being used commercially while being removed from all group content. Source: Sportskeeda March 13."}, {"date": "Mar 14, 2026", "type": "contradiction", "title": "Melbourne — Heeseung absent just 4 days after announcement", "body": "Concert promoter Applewood officially confirms Heeseung will not perform. He was reportedly expected to travel with the group until days before the announcement."}, {"date": "Mar 15, 2026", "type": "official", "title": "Belift reaffirms to Korea Herald — first reason given for parallel solo impossibility", "body": "\"Enhypen's schedule remains extremely demanding throughout the year.\" Answer came 5 days after Billboard asked the same question. Korea Herald confirms Melbourne flight canceled ~March 12 via named source Shivani Srinivasan. Source: Korea Herald March 15, 2026."}, {"date": "Mar 16–17, 2026", "type": "contradiction", "title": "Jay's Weverse comment on Heeseung post deleted in real time", "body": "Jay commented \"AI detected\" on a Weverse post featuring Heeseung. Deleted almost immediately. Documented by Koreaboo with multiple fan captures. Second instance of member content referencing Heeseung being rapidly removed."}, {"date": "Mar 17, 2026", "type": "official", "title": "Change.org petition closes — 2,084,798 signatures", "body": "2,084,798 signatories from dozens of countries. Change.org's official account promoted the petition — described as rare for entertainment topics. Source: Manila Bulletin March 18."}, {"date": "Mar 18, 2026", "type": "public", "title": "NPS International Pension Service Center disrupted", "body": "~1,500 emails temporarily disrupt the NPS center serving overseas workers. NPS confirms no intervention in corporate decisions. This site does not endorse this action."}, {"date": "Mar 19, 2026", "type": "contradiction", "title": "New fancall lists \"ENHYPEN / Heeseung\" separately", "body": "Heeseung listed separately from group name but attached to ENHYPEN album fancall event. Source: Koreaboo March 19."}, {"date": "Mar 20, 2026", "type": "official", "title": "Heeseung still listed as ENHYPEN member on Korean portal sites — Day 11", "body": "No profile information updated 11 days after official announcement. Source: StarNews Korea March 20."}, {"date": "Mar 21, 2026", "type": "public", "title": "Ni-ki confirms six-member status on live", "body": "When asked to perform ENHYPEN choreography: \"You have to watch all six members. There's no point in doing it alone.\" Third documented member reference to group's current six-member status. Source: Koreaboo."}, {"date": "Mar 21, 2026", "type": "contradiction", "title": "Shanghai fansign (Yizhiyu) canceled — Heeseung will not attend", "body": "Official Yizhiyu announcement. Full refunds being processed. Fourth commercial schedule involving Heeseung disrupted since March 10. Source: Koreaboo March 21."}, {"date": "Mar 22, 2026", "type": "public", "title": "Yizhiyu Fan Call R4 — 8:00 PM KST — \"ENHYPEN / Heeseung\"", "body": "Heeseung's first scheduled post-departure fan interaction. Still listed as \"ENHYPEN / Heeseung\" attached to ENHYPEN album commercial activities. Source: X fan documentation."}], "sources": [{"id": "S01", "category": "Official Statements", "title": "Belift Lab official statement — March 10, 2026", "outlet": "ENHYPEN official X + Soompi", "note": "Primary document analyzed on this site. Official departure announcement citing \"distinct musical vision\" and \"extensive deliberation.\"", "url": "https://x.com/ENHYPEN/status/2031263792613699825"}, {"id": "S02", "category": "Official Statements", "title": "Billboard — \"Most fulfilling approach\" non-answer", "outlet": "Billboard — March 11, 2026", "note": "Belift's response to Billboard's direct question about why parallel solo was impossible. Restates conclusion without explaining premise.", "url": "https://www.billboard.com/music/music-news/enhypen-label-heeseung-band-exit-most-fulfilling-approach-1236197045/"}, {"id": "S03", "category": "Official Statements", "title": "Billboard — HYBE official letter translation", "outlet": "Billboard", "note": "HYBE's official English translation: \"in line with the direction that was discussed.\"", "url": "https://www.billboard.com/music/music-news/enhypen-heeseung-leaves-group-solo-1236195800/"}, {"id": "S04", "category": "Official Statements", "title": "Manila Bulletin — alternative translation", "outlet": "Manila Bulletin", "note": "\"to follow the direction the company has suggested.\" Second independent translation.", "url": "https://mb.com.ph/2026/03/14/can-16-million-signatures-online-campaign-bring-heeseung-back-to-enhypen"}, {"id": "S05", "category": "Key Contradiction Evidence", "title": "En-O'Clock suspension — March 12, 2026", "outlet": "ENHYPEN YouTube + Soompi", "note": "Weekly pre-recorded series suspended. Confirms Heeseung was still being filmed close enough to announcement date that completed episodes cannot be released.", "url": "https://www.soompi.com/article/1824084wpp/breaking-enhypen-announces-heeseungs-departure-from-group"}, {"id": "S06", "category": "Key Contradiction Evidence", "title": "OT7 merchandise same day as announcement — March 10, 2026", "outlet": "ENHYPEN World + TODAY.com", "note": "OT7 merch scheduled 5PM KST, pulled 40 minutes after departure notice. Source: kpopworld.com March 10.", "url": "https://www.today.com/popculture/music/enhypen-heeseung-leaves-group-rcna197073"}, {"id": "S08", "category": "Key Contradiction Evidence", "title": "Billboard — Jake TV quote + members did not discuss Heeseung", "outlet": "Billboard — March 12, 2026", "note": "Jake: \"There's been a bit of changes in the choreo with the formation, all that.\" Billboard confirms Jake and Jay did not discuss Heeseung's departure during the interview at all.", "url": "https://www.billboard.com/music/music-news/enhypen-en-o-clock-series-hiatus-heeseung-exit-1236197899/"}, {"id": "S21", "category": "Key Contradiction Evidence", "title": "Korea Herald — Belift reaffirmation + flight cancellation confirmed — March 15", "outlet": "Korea Herald — March 15, 2026", "note": "Belift reaffirms to Korea Herald. First reason given: \"Enhypen's schedule remains extremely demanding.\" Named source Shivani Srinivasan confirms Melbourne flight canceled ~March 12. Primary source for ARG 14 and ARG 15.", "url": "https://www.koreaherald.com/article/10694588"}, {"id": "S23", "category": "Letter Translations", "title": "StarNews Korea — third independent translation", "outlet": "StarNews Korea", "note": "\"depending on the direction the company suggested.\" Third of four independent translations.", "url": "https://star.mt.co.kr/stview.php?no=2026031011253875736"}, {"id": "S47", "category": "Industry Analysis", "title": "Rolling Stone Australia — fourth independent translation", "outlet": "Rolling Stone Australia", "note": "\"according to the direction the company suggested.\" Major mainstream outlet, not K-pop specialist. Most explicit of four translations.", "url": "https://au.rollingstone.com/music/music-news/enhypen-heeseung-leaves-group-solo-album-92326/"}, {"id": "S48", "category": "Industry Analysis", "title": "Korea Times — \"ENHYPEN at Crossroads\" — March 19", "outlet": "Korea Times — March 19, 2026", "note": "Analytical piece presenting multiple perspectives, including observers calling the departure \"a decision that doesn't respect his remaining contract period.\"", "url": "https://www.koreatimes.co.kr/entertainment/k-pop/20260319/after-heeseungs-exit-enhypen-at-crossroads-as-it-enters-7th-year"}, {"id": "S49", "category": "Industry Analysis", "title": "Korea Herald — industry executive: \"There must be some reason both chose to maintain the contract\"", "outlet": "Korea Herald", "note": "Official at a major K-pop company: \"There must be some reason both Heeseung and Belift Lab chose to maintain the contract.\" Recorded neutrally — does not confirm or deny any specific theory.", "url": "https://www.koreaherald.com/article/10692171"}, {"id": "S50", "category": "Key Contradiction Evidence", "title": "kpopworld.com — precise merch timing, D Awards speech, Sin:Vanish stats", "outlet": "kpopworld.com", "note": "Documents precise 5:00 PM KST merch scheduling on March 10. Also documents Heeseung's D Awards acceptance speech and Sin: Vanish commercial performance.", "url": "https://www.kpopworld.com"}, {"id": "S51", "category": "Official Statements", "title": "Koreaboo — Jungwon \"contract renewal discussions haven't happened yet\" — Jan 14, 2026", "outlet": "Koreaboo — January 16, 2026", "note": "Jungwon states on record that no contract renewal discussions have occurred as of January 2026, while contracts run until November 2027.", "url": "https://www.koreaboo.com/news/enhypen-jungwon-addresses-contract-renewal-sin-vanish-release/"}], "faq": [{"q": "Isn't this just fan speculation?", "a": "No. Every argument on this site is sourced from Belift's own statements, published interviews, or documented public events. The OT7 merch timing, the En-O'Clock suspension, the Melbourne schedule disruption, the Billboard non-answer, the passive language in Heeseung's letter — these are documented facts, not fan theories. Speculation is claiming to know what happened. This site does not make that claim. It claims Belift's statement doesn't match what the public record shows."}, {"q": "Didn't Belift give a reason on March 15? Isn't this resolved?", "a": "Partially. The March 15 Korea Herald statement is the first time Belift addressed why the parallel solo model was structurally impossible. That partial resolution is acknowledged and documented here. What is not resolved: why the answer took 5 days and a direct press inquiry to produce; why Billboard's same question on March 11 received a non-answer; why the Melbourne flight was booked and then canceled two days before the event. The March 15 statement addresses 1 of 16 documented contradictions."}, {"q": "Maybe they kept it vague to protect his privacy?", "a": "Privacy protection does not explain the refusal to answer a structural business question. Billboard's question — why was the parallel model structurally impossible — has nothing to do with Heeseung's personal life. It's a question about business structure. On March 15, Belift gave the answer: \"Enhypen's schedule remains extremely demanding.\" That answer is not privacy-sensitive. It was available March 10. It was not provided."}, {"q": "He could have been unhappy and chosen this for his wellbeing", "a": "True — and no one here disputes that. Heeseung's potential unhappiness or burnout is acknowledged as a real possibility. The argument is not \"he was successful so he must have been happy.\" The argument is: if health or burnout was the reason, Belift had industry-validated ways to communicate that without disclosing private medical information. They did not use them. The word 'health' does not appear anywhere in their statement."}, {"q": "'Suggested' is not the same as 'ordered.' He could have chosen to follow the suggestion.", "a": "True — suggestion is not a command, and no one here claims otherwise. The argument is narrower: Belift's official statement frames this as Heeseung's own artistic decision. His letter — in four independent translations — says he followed a direction the company suggested. That is a contradiction between two official documents, regardless of whether 'suggested' implies coercion or not."}, {"q": "What about the March 18 NPS disruption?", "a": "On March 18, NPS chairman Kim Sung-joo confirmed that approximately 1,500 emails and international calls temporarily disrupted the NPS International Pension Service Center — a department serving overseas workers and Koreans living abroad. People who genuinely needed pension support could not access services. This site does not endorse this action. It caused direct harm to people unconnected to this situation. NPS confirmed they do not intervene in corporate personnel decisions — the action was also strategically meaningless."}, {"q": "Demanding Heeseung return isn't his choice to make", "a": "Correct. Fans demanding Heeseung's return are overstepping. A person's career decision cannot be reversed by public pressure. This site does not make that demand and does not endorse it. The arguments here are directed at Belift Lab's public statement — not at Heeseung's personal choices."}], "i18n": {"en": {"siteTitle": "THE RECORD", "tagline": "Independent Documentation Project — ENHYPEN / Belift Lab", "nav": {"home": "Home", "case": "The Case", "timeline": "Timeline", "analysis": "Analysis", "sources": "Sources", "faq": "FAQ", "news": "AI News"}, "hero": {"title": "Why Belift Lab's Explanation", "titleEm": "Doesn't Add Up", "sub": "Fact-based, sourced analysis of the public record surrounding Heeseung's departure from ENHYPEN on March 10, 2026. No speculation. No rumors. No unverified claims."}, "counters": {"args": "Documented contradicti window.toggleFaq = function(i) {
  const item = document.getElementById('faq-' + i);
  const icon = document.getElementById('faq-icon-' + i);
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.faq-icon').forEach(e => e.textContent = '+');
  if (!isOpen) { item.classList.add('open'); icon.textContent = '×'; }
};

window.copyArg = function(i) {
  const arg = DATA.arguments[i];
  const text = arg.id + ': ' + arg.title + '\n\nVerdict: ' + arg.verdict + '\n\nSource: ' + window.location.origin + window.location.pathname;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-' + i);
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = '⎘ Copy', 2000); }
  });
};

window.downloadCard = function(i) {
  const arg = DATA.arguments[i];
  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1080;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#060606'; ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle = '#b5291c'; ctx.fillRect(0,0,1080,8);
  ctx.fillStyle = '#888'; ctx.font = '500 20px monospace';
  ctx.fillText('THE RECORD — BELIFT STATEMENT ANALYSIS', 80, 100);
  ctx.fillStyle = '#d4352a'; ctx.font = '500 26px monospace';
  ctx.fillText(arg.id, 80, 180);
  ctx.fillStyle = '#f2ede4'; ctx.font = 'bold 42px Georgia, serif';
  const words = arg.title.split(' '); let line = '', y = 280;
  words.forEach(w => {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > 920 && line) { ctx.fillText(line, 80, y); line = w + ' '; y += 60; } else line = test;
  });
  ctx.fillText(line, 80, y); y += 70;
  ctx.fillStyle = '#b5291c'; ctx.fillRect(80, y, 100, 3); y += 32;
  ctx.fillStyle = '#999'; ctx.font = '400 26px monospace';
  ctx.fillText(arg.verdict, 80, y); y += 50;
  ctx.fillStyle = '#666'; ctx.font = '300 22px Georgia, serif';
  const bWords = arg.body.substring(0,280).split(' '); let bl = '', by = y;
  bWords.forEach(w => {
    const t2 = bl + w + ' ';
    if (ctx.measureText(t2).width > 920 && bl) { ctx.fillText(bl, 80, by); bl = w + ' '; by += 36; } else bl = t2;
  });
  ctx.fillText(bl + '...', 80, by);
  ctx.fillStyle = '#b5291c'; ctx.font = '400 20px monospace';
  ctx.fillText('please-be-safe.github.io/belift-statement-analysis', 80, 1020);
  const a = document.createElement('a');
  a.download = 'the-record-' + arg.id.toLowerCase().replace(/\s+/g,'-') + '.png';
  a.href = canvas.toDataURL(); a.click();
};

window.runNewsSearch = async function() {
  const key = document.getElementById('news-key').value.trim();
  const btn = document.getElementById('news-search-btn');
  const errEl = document.getElementById('news-error');
  const resEl = document.getElementById('news-result');
  const tk = t();

  if (!key) { errEl.textContent = 'Please enter your Anthropic API key.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  resEl.style.display = 'none';
  btn.disabled = true; btn.textContent = tk.searching;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5-20251001',
        max_tokens: 2000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: 'You are a neutral news monitor. Today is March 22, 2026. Search for the very latest news about Heeseung, ENHYPEN, and Belift Lab. Focus on: official statements, new public events, member statements, new media coverage. Format as clear neutral bullet points, most recent first, with source names. Be factual. No speculation.',
        messages: [{ role: 'user', content: 'Search for the latest news about Heeseung ENHYPEN Belift Lab from the past 48 hours. What are the most recent documented developments?' }]
      })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error ' + response.status);
    }
    const data = await response.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n') || 'No results returned.';
    resEl.textContent = text;
    resEl.style.display = 'block';
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = tk.searchBtn;
  }
};
