  "faq": [
    { "q": "Isn't this just fan speculation?", "a": "No. Every argument on this site is sourced from Belift's own statements, published interviews, or documented public events. The OT7 merch timing, the En-O'Clock suspension, the Melbourne schedule disruption, the Billboard non-answer, the passive language in Heeseung's letter — these are documented facts, not fan theories. Speculation is claiming to know what happened. This site does not make that claim. It claims Belift's statement doesn't match what the public record shows." },
    { "q": "Didn't Belift give a reason on March 15? Isn't this resolved?", "a": "Partially. The March 15 Korea Herald statement is the first time Belift addressed why the parallel solo model was structurally impossible. That partial resolution is acknowledged and documented here. What is not resolved: why the answer took 5 days and a direct press inquiry to produce; why Billboard's same question on March 11 received a non-answer; why the Melbourne flight was booked and then canceled two days before the event. The March 15 statement addresses 1 of 16 documented contradictions." },
    { "q": "Maybe they kept it vague to protect his privacy?", "a": "Privacy protection does not explain the refusal to answer a structural business question. Billboard's question — why was the parallel model structurally impossible — has nothing to do with Heeseung's personal life. It's a question about business structure. On March 15, Belift gave the answer: \"Enhypen's schedule remains extremely demanding.\" That answer is not privacy-sensitive. It was available March 10. It was not provided." },
    { "q": "He could have been unhappy and chosen this for his wellbeing", "a": "True — and no one here disputes that. Heeseung's potential unhappiness or burnout is acknowledged as a real possibility. The argument is not \"he was successful so he must have been happy.\" The argument is: if health or burnout was the reason, Belift had industry-validated ways to communicate that without disclosing private medical information. They did not use them. The word 'health' does not appear anywhere in their statement." },
    { "q": "'Suggested' is not the same as 'ordered.' He could have chosen to follow the suggestion.", "a": "True — suggestion is not a command, and no one here claims otherwise. The argument is narrower: Belift's official statement frames this as Heeseung's own artistic decision. His letter — in four independent translations — says he followed a direction the company suggested. That is a contradiction between two official documents, regardless of whether 'suggested' implies coercion or not." },
    { "q": "What about the March 18 NPS disruption?", "a": "On March 18, NPS chairman Kim Sung-joo confirmed that approximately 1,500 emails and international calls temporarily disrupted the NPS International Pension Service Center — a department serving overseas workers and Koreans living abroad. People who genuinely needed pension support could not access services. This site does not endorse this action. It caused direct harm to people unconnected to this situation. NPS confirmed they do not intervene in corporate personnel decisions — the action was also strategically meaningless." },
    { "q": "Demanding Heeseung return isn't his choice to make", "a": "Correct. Fans demanding Heeseung's return are overstepping. A person's career decision cannot be reversed by public pressure. This site does not make that demand and does not endorse it. The arguments here are directed at Belift Lab's public statement — not at Heeseung's personal choices." }

    const words = arg.title.split(' ');

      else line = test;

    ctx.fillText(line, 80, y); y += 80;
    ctx.fillStyle = '#b5291c'; ctx.fillRect(80, y, 120, 3); y += 36;
    ctx.fillStyle = '#888'; ctx.font = '400 28px "IBM Plex Mono", monospace';

    ctx.fillText(bLine + '...', 80, by);

// ===== AI NEWS PAGE =====
function NewsPage({ t, lang }) {
  const [apiKey, setApiKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState('');
  const [error, setError] = useState('');

  const search = async () => {
    if (!apiKey.trim()) { setError('Please enter your Anthropic API key.'); return; }
    setLoading(true); setError(''); setResult('');
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey.trim(),
          'anthropic-version': '2023-06-01',
          'anthropic-beta': 'interleaved-thinking-2025-05-14'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5-20251001',
          max_tokens: 2000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: `You are a neutral news monitor for The Record documentation site about Heeseung leaving ENHYPEN on March 10, 2026. 
Search for the very latest news and developments about Heeseung, ENHYPEN, and Belift Lab from the past few days. Today is March 22, 2026.
Focus on: official statements from Belift/HYBE, new events involving Heeseung commercially or publicly, ENHYPEN member statements, fan events, new media coverage.
Format your response as clear, neutral bullet points. Start with the most recent. Include source names. Be factual and avoid speculation.
If you find nothing new beyond March 21, say so clearly.`,
          messages: [{ role: 'user', content: 'Search for the latest news about Heeseung ENHYPEN Belift Lab from the past 48 hours. What are the most recent documented developments?' }]
        })
      });
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error ' + response.status);
      }
      const data = await response.json();
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      setResult(text || 'No results returned.');
    } catch (e) {
      setError('Error: ' + e.message);
    } finally {
      setLoading(false);
    }
  };

  return React.createElement('div', { className: 'page-enter' },
    React.createElement('div', { className: 'page-hero' },
      React.createElement('div', { className: 'page-hero-inner' },
        React.createElement('div', { className: 'site-label' }, lang === 'vi' ? 'Trang 06 — Theo Dõi Tin AI' : lang === 'ko' ? '06페이지 — AI 뉴스 모니터' : 'Page 06 — AI News Monitor'),
        React.createElement('h1', null, t.newsHero.title, React.createElement('br'), React.createElement('em', null, t.newsHero.titleEm)),
        React.createElement('p', { className: 'page-hero-desc' }, t.newsHero.sub)
      ),
      React.createElement('div', { className: 'page-hero-bg', 'aria-hidden': 'true' }, 'NEWS')
    ),
    React.createElement('div', { className: 'page-content-wrap' },
      React.createElement('div', { className: 'page-section' },
        React.createElement('div', { className: 'ai-news-box' },
          React.createElement('div', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '10px', letterSpacing: '.2em', textTransform: 'uppercase', color: 'var(--red-light)', marginBottom: '16px' } }, '● Live Search'),
          React.createElement('p', { style: { marginBottom: '16px', color: 'var(--text)' } },
            lang === 'vi' ? 'Nhập API key Anthropic của bạn để tìm kiếm tin tức mới nhất về Heeseung và ENHYPEN bằng Claude + web search. Key không bao giờ được lưu trữ.' :
            lang === 'ko' ? 'Anthropic API 키를 입력하면 Claude + 웹 검색으로 Heeseung과 ENHYPEN에 대한 최신 뉴스를 실시간 검색합니다. 키는 절대 저장되지 않습니다.' :
            'Enter your Anthropic API key to search for the latest news about Heeseung and ENHYPEN using Claude + live web search. Your key is never stored.'
          ),
          React.createElement('input', {
            className: 'ai-news-input',
            type: 'password',
            placeholder: t.apiKeyPlaceholder,
            value: apiKey,
            onChange: e => setApiKey(e.target.value),
            onKeyDown: e => e.key === 'Enter' && !loading && search()
          }),
          React.createElement('div', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '11px', color: 'var(--gray)', marginBottom: '16px' } }, t.apiKeyNote),
          React.createElement('button', {
            className: 'search-btn',
            onClick: search,
            disabled: loading
          }, loading ? t.searching : t.searchBtn),
          error ? React.createElement('div', { style: { marginTop: '16px', color: 'var(--red-light)', fontFamily: "'IBM Plex Mono',monospace", fontSize: '13px' } }, error) : null,
          result ? React.createElement('div', { className: 'ai-news-result', dangerouslySetInnerHTML: { __html: typeof marked !== 'undefined' ? marked.parse(result) : result } }) : null
        ),
        React.createElement('div', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px', color: 'var(--text-dim)', lineHeight: '1.8', padding: '24px', background: 'var(--gray-dark)', border: '1px solid var(--border)' } },
          React.createElement('strong', { style: { color: 'var(--gray-light)' } }, 'How to get an API key: '),
          'Visit ',
          React.createElement('a', { href: 'https://console.anthropic.com', target: '_blank', style: { color: 'var(--red-light)' } }, 'console.anthropic.com'),
          ', create an account, go to API Keys, and create a new key. Free tier includes enough usage for this feature.'
        )
      )
    )
  );
}

// ===== MAIN APP =====
function App() {
  const [route, navigate] = useHashRoute();
  const data = useData();
  const [lang, setLang] = useState('en');

  // Update html lang attribute
  useEffect(() => { document.documentElement.lang = lang; }, [lang]);

  // Update font based on language
  useEffect(() => {
    const body = document.body;
    if (lang === 'ko') body.style.fontFamily = "'Noto Serif KR', serif";
    else if (lang === 'vi') body.style.fontFamily = "'Noto Serif', Georgia, serif";
    else body.style.fontFamily = "'Source Serif 4', Georgia, serif";
  }, [lang]);

  // data always available (inlined)

  const t = data.i18n[lang] || data.i18n.en;

  const pages = {
    home: () => React.createElement(HomePage, { data, t, lang, navigate }),
    case: () => React.createElement(CasePage, { data, t, lang }),
    timeline: () => React.createElement(TimelinePage, { data, t, lang }),
    analysis: () => React.createElement(AnalysisPage, { data, lang }),
    sources: () => React.createElement(SourcesPage, { data, lang }),
    faq: () => React.createElement(FaqPage, { data, lang }),
    news: () => React.createElement(NewsPage, { t, lang })
  };

  const currentPage = pages[route] || pages.home;

  return React.createElement('div', { id: 'app' },
    React.createElement(Topbar, { t, meta: data.meta }),
    React.createElement(Nav, { route, navigate, lang, setLang, t }),
    currentPage(),
    route !== 'home' ? React.createElement(ShareBar, { t }) : null,
    React.createElement(Footer, { lang })
  );
}

// ===== MOUNT =====
const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));
</script>
