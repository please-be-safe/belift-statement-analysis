 "<strong>Heeseung officially launches solo era as EVAN.</strong> @h_evva_n Instagram surpassed 2M followers within hours. No album date announced. Sources: Billboard, Korea Herald."}, {"date": "Apr 6, 2026", "tag": null, "text": "<strong>Heeseung at fancall:</strong> “I’m going to come back as soon as possible.” Vague wording divided fans: solo debut or return to ENHYPEN? Source: Koreaboo."}, {"date": "Mar 30, 2026", "tag": null, "text": "<strong>ENHYPEN announces Blood Saga World Tour</strong> — 30 shows, 21 cities, through March 2027. First tour as six-member group. Tour poster: six silhouettes against a blood-red sky. Source: Soompi."}, {"date": "Mar 22, 2026", "tag": null, "text": "<strong>Heeseung’s first public appearance since March 10</strong> — Yizhiyu fancall. “I am fine.” “I feel a little sorry.” Solo album confirmed. Source: Korea Herald."}, {"date": "Mar 10, 2026", "tag": null, "text": "<strong>Departure announced.</strong> OT7 merch scheduled 5PM KST, pulled 40 min after notice. Four independent letter translations all attribute direction to company."}], "arguments": [{"id": "ARG 01", "title": "Belift’s statement is self-defeating in a single paragraph", "verdict": "Internally inconsistent", "status": "unresolved", "body": "Belift’s own statement reads: \"It's difficult to relay the whole process through a short notice, but this decision comes after extensive deliberation.\" If the deliberation was genuinely extensive — prolonged, substantive, carefully considered — then the company had ample time to prepare a comprehensive statement. No external force required the short notice format. HYBE is South Korea's third-largest entertainment conglomerate with a professional PR infrastructure. \"It's difficult to relay the whole process\" is not an acknowledgment of complexity. It is an acknowledgment of concealment. These two claims — extensive deliberation, insufficient time to explain — cannot both be true when the same party controls both the timeline and the platform."}, {"id": "ARG 02", "title": "A contract with 20 months remaining — and no explanation for why it was broken", "verdict": "No precedent. No explanation.", "status": "unresolved", "body": "Heeseung’s exclusive contract with Belift Lab runs until November 2027 — approximately 20 months from the date of announcement. Belift confirmed the departure has nothing to do with contract renewal. In the K-pop industry, mid-contract departures occur under three documented circumstances: health crises, irreconcilable internal conflict, or forced restructuring by the company. Belift formally ruled out all three. This is the first lineup change since ENHYPEN's debut in November 2020 — over five years of an intact roster. No industry precedent supports a voluntary mid-contract departure under the circumstances Belift has described."}, {"id": "ARG 03", "title": "Billboard asked a direct causal question — Belift did not answer it", "verdict": "Direct question. Non-answer on record.", "status": "partial", "body": "When Billboard asked directly why Heeseung could not pursue solo activities while remaining in ENHYPEN — citing BTS and BLACKPINK members as precedent — Belift’s full response was: \"We concluded that allowing HEESEUNG to focus fully on his career as a solo artist, rather than pursuing solo activities within the team, would be the most fulfilling approach for both ENHYPEN and HEESEUNG.\" The question: Why was the parallel model structurally impossible? The answer: We decided not being parallel was best. That is not an answer. TXT's Yeonjun pursues solo activities while remaining a full member of TXT under HYBE itself. On March 15, Belift finally gave a reason: \"Enhypen's schedule remains extremely demanding throughout the year.\" That answer took 5 days and a press inquiry to produce."}, {"id": "ARG 04", "title": "Heeseung’s own letter does not use the language of a self-initiated decision", "verdict": "Passive framing. Direction originated externally.", "status": "unresolved", "body": "Four independent translations of the same Weverse post. HYBE official (Billboard): \"I ultimately made a big decision in line with the direction that was discussed.\" Manila Bulletin: \"I've made the bold decision to follow the direction the company has suggested.\" StarNews Korea: \"depending on the direction the company suggested.\" Rolling Stone Australia: \"according to the direction the company suggested.\" None constitute the language of independent, self-originated agency. The standard for voluntary K-pop departure statements is consistent: \"I decided,\" \"I wanted,\" \"I chose.\" Heeseung’s letter uses none of these. It says the direction existed before him and he followed it."}, {"id": "ARG 05", "title": "En-O’Clock — the single most damaging piece of material evidence", "verdict": "Production continued past the alleged decision point.", "status": "unresolved", "body": "On March 12, Belift Lab announced that En-O’Clock — a weekly pre-recorded variety series — would be \"temporarily suspended\" and would \"return in April with better content.\" En-O’Clock is pre-recorded and pre-edited content. It cannot air weekly without being filmed at least several weeks in advance. This means: as of March 10, Belift was holding completed episodes featuring Heeseung that they cannot now release. The suspension was necessary because those episodes must be re-edited or re-filmed to remove him. If this departure was the product of extensive, long-running deliberation — why was content still being filmed with Heeseung close enough to the announcement date that its release is now impossible? There is only one answer: the decision arrived too late to halt production in time."}, {"id": "ARG 06", "title": "OT7 merchandise was released and pulled on the same day as the announcement", "verdict": "OT7 merch on departure day. Irreconcilable with advance planning.", "status": "unresolved", "body": "On March 10, ENHYPEN World published an announcement for new official merchandise scheduled to open at 5:00 PM KST featuring all seven members including Heeseung. Forty minutes after the departure notice went live, ENHYPEN World posted again: the launch had been \"inevitably changed.\" A company that spent months carefully planning a founding member's departure does not schedule OT7 merchandise to open at 5:00 PM KST on the same day as the announcement. The merchandise was not pre-pulled before the announcement. It was publicly scheduled, then retracted forty minutes after the departure notice. Source: kpopworld.com March 10, 2026."}, {"id": "ARG 07", "title": "The commercial timing paradox has no coherent solution", "verdict": "Two-day gap. One of two scenarios — both damaging.", "status": "unresolved", "body": "ENHYPEN released The Sin: Vanish in January 2026, debuted at Coachella, and completed the Walk the Line World Tour. Sunghoon publicly confirmed upcoming tour activity for 2026. On March 8 — two days before the announcement — Heeseung himself publicly discussed plans to return to Europe with the group. The logic is binding: if deliberation had already concluded before March 10, Heeseung discussed future tour dates knowing he was about to leave. That is direct misrepresentation to the public. If deliberation had not yet concluded as of March 8, then the announcement was not the product of extensive deliberation. One of these must be true. Both cannot be."}, {"id": "ARG 08", "title": "Melbourne and choreography confirm the departure was abrupt", "verdict": "International schedule disrupted four days out.", "status": "unresolved", "body": "ENHYPEN was scheduled to headline an event in Melbourne on March 14 — four days after the announcement. Concert promoter Applewood officially confirmed Heeseung would not be performing. Multiple sources reported he was expected to travel with the group until days before the announcement. Additionally, member Jake confirmed on live Australian TV that stage choreography had been recently reorganized — meaning formations were still being built around seven members close enough to the announcement that they required urgent restructuring afterward. A departure planned months in advance does not result in a member being pulled from international travel four days out."}, {"id": "ARG 09", "title": "El Capitxn found out from the news — not from Heeseung or Belift", "verdict": "Close collaborator. Zero advance notice.", "status": "unresolved", "body": "El Capitxn, a producer with a direct professional working relationship to Heeseung, publicly acknowledged: \"I couldn't get in contact with him, so I first learned about it from the news.\" Belift claims the decision involved extensive deliberation with many people over a long period. A person with a direct professional relationship to the departing artist found out the same way fans did — from a public announcement. This is consistent with a decision that was not widely communicated in advance, which is inconsistent with extensive, long-running deliberation involving many people."}, {"id": "ARG 10", "title": "2 million signatures is not \"mixed reactions\"", "verdict": "Documented mischaracterization of public response.", "status": "unresolved", "body": "Within 72 hours of the announcement, a Change.org petition surpassed 1.6 million signatures from dozens of countries. The petition closed at 2,084,798 signatures. Over 18 protest trucks were deployed outside HYBE headquarters. Fans from Singapore organized consecutive days of demonstrations. Belift’s statement: \"We understand that this news is a lot to process and may be received with mixed reactions.\" 2 million signatures moving in one direction is not mixed reactions. It is a unified, cross-continental response. Describing this scale of response as \"mixed\" is itself a documented mischaracterization of the public record."}, {"id": "ARG 11", "updatedLabel": "Updated March 15", "title": "Jake confirmed choreography restructuring on live television — and neither member discussed Heeseung at all", "verdict": "Member-confirmed on live TV. Departure not discussed. Both documented by Billboard.", "status": "unresolved", "body": "On March 11, Jake and Jay appeared on Australia's The Morning Show. Billboard: \"There's been a bit of changes in the choreo with the formation, all that. So we've been practicing a lot.\" SE7EN.ws: \"There have been significant adjustments to our choreography and stage formations to prepare for the Hello Melbourne festival.\" Both versions confirm the same documented fact: stage formations were being actively restructured after the departure announcement. A departure planned months in advance does not require urgent formation changes days before an international performance. Billboard also confirmed that Jake and Jay \"did not discuss\" Heeseung’s departure during the interview at all — despite it being the single most significant thing to happen to the group in five years."}, {"id": "ARG 12", "updatedLabel": "Updated March 15", "title": "OT7 merchandise released on March 13 — three days after the departure announcement", "verdict": "OT7 merch on March 10. OT7 merch again on March 13. Both after announcement.", "status": "unresolved", "body": "On March 13, 2026 — three days after Heeseung’s departure was announced — ENHYPEN World released new official merchandise featuring all seven members, including Heeseung. This is separate from the March 10 merchandise incident. This is a second documented instance of Belift releasing OT7 commercial content after the departure had already been publicly announced. The same entity that removed him from group activities is simultaneously profiting from his image. Source: Sportskeeda March 13, 2026."}, {"id": "ARG 13", "updatedLabel": "New March 15", "title": "Heeseung still being sold as an ENHYPEN member for commercial events while erased from content", "verdict": "Erased from content. Still sold commercially. Multiple events after departure.", "status": "unresolved", "body": "YZY fansign listed Heeseung as a purchasable ENHYPEN option after departure. March 19: new fancall listed \"ENHYPEN / Heeseung\" — his name separate from the group but attached to an ENHYPEN album event. March 21: Shanghai in-person fansign canceled after being sold. March 22: Yizhiyu Fan Call R4 at 8PM KST — first scheduled post-departure fan interaction, still listed as \"ENHYPEN / Heeseung.\" The same institution that removed him from group content continues to exploit his ENHYPEN association for commercial events."}, {"id": "ARG 14", "updatedLabel": "New March 15", "title": "Belift reaffirms on March 15 — and finally gives a reason for the first time. It still doesn't hold up.", "verdict": "First real reason given. Five days late. Still incomplete.", "status": "partial", "body": "On March 15, Belift told The Korea Herald: \"Heeseung will not be returning to Enhypen. He has a clear artistic direction he wants to pursue, and we decided to respect that.\" First reason given for why parallel solo was impossible: \"Enhypen's schedule remains extremely demanding throughout the year, making it difficult for members to develop independent musical projects while maintaining full group activities.\" This answer was available on March 10 when Billboard asked directly. They did not give it. The answer also does not explain why a reduced group schedule — the solution HYBE used for BTS — was not considered. Source: Korea Herald March 15, 2026."}, {"id": "ARG 15", "updatedLabel": "New March 15", "title": "Heeseung’s flight to Melbourne was canceled only two days before the event — confirmed by Korea Herald", "verdict": "Flight booked. Canceled March 12. Departure decision was not made months in advance.", "status": "unresolved", "body": "The Korea Herald, in its March 15 article, documents that Heeseung’s flight ticket for the Melbourne Music Festival was canceled only two days before the event — on approximately March 12. This is reported by The Korea Herald citing a named source: Shivani Srinivasan. If Heeseung’s departure was the product of extensive deliberation concluded well before March 10 — his flight to Melbourne would never have been booked in the first place. The flight existed. It was canceled two days before the event. That is the departure date of the decision, not March 10 when the announcement was made, and certainly not weeks or months before when Belift claims deliberation was underway. Source: Korea Herald March 15, 2026."}, {"id": "ARG 16", "updatedLabel": "New March 17", "title": "Jay's comment on a post featuring Heeseung was deleted almost immediately — documented by Koreaboo", "verdict": "Comment deleted in real time. Pattern of active content restrictions on members.", "status": "unresolved", "body": "On March 16-17, member Jay commented \"AI detected\" on a Weverse post that included a photo of Heeseung. The comment was deleted almost immediately. Koreaboo documented the incident, with multiple fan accounts capturing the comment before deletion. This is the second documented instance of a member appearing to reference Heeseung in a public-facing space and that reference being removed rapidly. A company overseeing a smooth, consensual transition does not require active real-time deletion of member comments referencing the departing artist. Source: Koreaboo March 17, 2026."}], "timeline": [{"date": "Nov 30, 2020", "type": "official", "title": "ENHYPEN debuts — 7 members, intact roster", "body": "ENHYPEN officially debuts under Belift Lab. Heeseung is the oldest member. This lineup remains intact for over five years with zero changes."}, {"date": "Late 2025", "type": "official", "title": "Walk the Line World Tour — includes Coachella debut", "body": "All seven members complete the Walk the Line World Tour including a landmark Coachella debut performance."}, {"date": "Jan 14, 2026", "type": "official", "title": "The Sin: Vanish debuts No. 2 Billboard 200", "body": "ENHYPEN's seventh mini-album debuts at No. 2 on the Billboard 200 with 122,000 units — their highest US chart position ever. Spotify first-week streams: 39.7 million. Source: Hollywood Reporter, Korea Times."}, {"date": "Jan 14, 2026", "type": "official", "title": "Jungwon: \"Contract renewal discussions haven't happened yet\"", "body": "Leader Jungwon states: \"There haven't been any discussions yet. We'll do our best to ensure a good outcome for ENGENEs.\" Contracts run until November 2027. Source: Koreaboo January 16, 2026."}, {"date": "Feb 11, 2026", "type": "official", "title": "D Awards — Heeseung receives first major solo award", "body": "Heeseung receives the UPICK Global Choice (Male) award — his first major solo trophy, earned through 1.4 billion fan votes. In his acceptance speech: \"Until now, I've always had the members by my side, so receiving congratulations on my own like this makes me feel very nervous.\" This is 27 days before the departure announcement. Source: kpopworld.com."}, {"date": "Early Mar 2026", "type": "public", "title": "Sunghoon confirms upcoming 2026 tour via Teen Vogue", "body": "\"We have an upcoming tour and also other activities that are lying ahead of us.\" — Sunghoon. Made with full group participation assumed. Source: Teen Vogue."}, {"date": "Mar 8, 2026", "type": "contradiction", "title": "Heeseung publicly discusses returning to Europe with ENHYPEN — 2 days before announcement", "body": "If deliberation had concluded, Heeseung discussed future tour plans while knowing he was about to leave. If it hadn't, there was no extensive deliberation. One of these must be true."}, {"date": "Mar 10, 2026", "type": "contradiction", "title": "OT7 merchandise scheduled 5:00 PM KST — pulled 40 minutes after departure notice", "body": "ENHYPEN World publishes OT7 merch announcement for 5PM KST open. Forty minutes after the departure notice, it is \"inevitably changed\" and rescheduled. Source: kpopworld.com March 10, 2026."}, {"date": "Mar 10, 2026", "type": "official", "title": "Belift Lab announces Heeseung’s departure", "body": "Statement cites \"distinct musical vision\" and \"extensive deliberation.\" No health reason. No timeline. No answer to why parallel solo was impossible. Four independent translations of Heeseung’s letter all attribute direction to company."}, {"date": "Mar 11, 2026", "type": "contradiction", "title": "Jake confirms choreography urgently restructured — live Australian TV", "body": "\"There's been a bit of changes in the choreo with the formation, all that. So we've been practicing a lot.\" — Jake, The Morning Show Australia. Billboard also confirms Jake and Jay did not discuss Heeseung’s departure at all during the interview. Source: Billboard March 12."}, {"date": "Mar 12, 2026", "type": "contradiction", "title": "En-O’Clock suspended — \"will return in April with better content\"", "body": "Pre-recorded content requires weeks of advance filming. Suspension confirms Heeseung was still being filmed close enough to the announcement that completed episodes cannot be released."}, {"date": "Mar 13, 2026", "type": "contradiction", "title": "OT7 merchandise released AGAIN — three days after departure", "body": "Second documented OT7 merchandise release after the departure announcement. Heeseung’s image still being used commercially while being removed from all group content. Source: Sportskeeda March 13."}, {"date": "Mar 14, 2026", "type": "contradiction", "title": "Melbourne — Heeseung absent just 4 days after announcement", "body": "Concert promoter Applewood officially confirms Heeseung will not perform. He was reportedly expected to travel with the group until days before the announcement."}, {"date": "Mar 15, 2026", "type": "official", "title": "Belift reaffirms to Korea Herald — first reason given for parallel solo impossibility", "body": "\"Enhypen's schedule remains extremely demanding throughout the year.\" Answer came 5 days after Billboard asked the same question. Korea Herald confirms Melbourne flight canceled ~March 12 via named source Shivani Srinivasan. Source: Korea Herald March 15, 2026."}, {"date": "Mar 16–17, 2026", "type": "contradiction", "title": "Jay’s Weverse comment on Heeseung post deleted in real time", "body": "Jay commented \"AI detected\" on a Weverse post featuring Heeseung. Deleted almost immediately. Documented by Koreaboo with multiple fan captures. Second instance of member content referencing Heeseung being rapidly removed."}, {"date": "Mar 17, 2026", "type": "official", "title": "Change.org petition closes — 2,084,798 signatures", "body": "2,084,798 signatories from dozens of countries. Change.org's official account promoted the petition — described as rare for entertainment topics. Source: Manila Bulletin March 18."}, {"date": "Mar 18, 2026", "type": "public", "title": "NPS International Pension Service Center disrupted", "body": "~1,500 emails temporarily disrupt the NPS center serving overseas workers. NPS confirms no intervention in corporate decisions. This site does not endorse this action."}, {"date": "Mar 19, 2026", "type": "contradiction", "title": "New fancall lists \"ENHYPEN / Heeseung\" separately", "body": "Heeseung listed separately from group name but attached to ENHYPEN album fancall event. Source: Koreaboo March 19."}, {"date": "Mar 20, 2026", "type": "official", "title": "Heeseung still listed as ENHYPEN member on Korean portal sites — Day 11", "body": "No profile information updated 11 days after official announcement. Source: StarNews Korea March 20."}, {"date": "Mar 21, 2026", "type": "public", "title": "Ni-ki confirms six-member status on live", "body": "When asked to perform ENHYPEN choreography: \"You have to watch all six members. There's no point in doing it alone.\" Third documented member reference to group's current six-member status. Source: Koreaboo."}, {"date": "Mar 21, 2026", "type": "contradiction", "title": "Shanghai fansign (Yizhiyu) canceled — Heeseung will not attend", "body": "Official Yizhiyu announcement. Full refunds being processed. Fourth commercial schedule involving Heeseung disrupted since March 10. Source: Koreaboo March 21."}, {"date": "Mar 22, 2026", "type": "public", "title": "Yizhiyu Fan Call R4 — 8:00 PM KST — \"ENHYPEN / Heeseung\"", "body": "Heeseung’s first scheduled post-departure fan interaction. Still listed as \"ENHYPEN / Heeseung\" attached to ENHYPEN album commercial activities. Source: X fan documentation."}, {"date": "Mar 23, 2026", "type": "official", "title": "Heeseung speaks publicly for the first time — confirms solo album", "body": "In the Yizhiyu fancall, Heeseung told fans: \"You must have been really surprised, but I am fine.\" He acknowledged feeling \"a little sorry on one hand\" and confirmed a solo album is forthcoming. This is his first public statement since the departure announcement on March 10. He did not address any of the contradictions in Belift’s official statement. Source: Korea Herald March 23, 2026."}, {"date": "Mar 25–26, 2026", "type": "official", "title": "The Sin: Vanish climbs to No. 61 on Billboard 200 — 8th week on chart", "body": "The album jumps 74 spots from the previous week, continuing to chart strongly post-departure. Having peaked at No. 2, it has now spent 8 weeks on the Billboard 200. Source: Korea Herald / The Star, March 26, 2026."}, {"date": "Mar 25, 2026", "type": "official", "title": "Additional Heeseung quote surfaces via Manila Bulletin", "body": "Heeseung: “I’m truly sorry for surprising everyone so suddenly” and “I know this may be hard to accept, but I hope you can continue to support both ENHYPEN and me.” Source: Manila Bulletin, March 25, 2026."}, {"date": "Mar 22, 2026", "type": "official", "title": "Fancall held as “Heeseung and ENHYPEN” — solo album hinted for May", "body": "Event held under revised name despite Heeseung’s departure — pre-scheduled before March 10. Heeseung: “I’m totally okay” and “a part of me feels a bit sorry too” and “I feel sorry for the members.” Solo album confirmed coming soon, fan transcripts suggest May 2026. Source: Korea Times, Asian Junkie, March 22–24, 2026."}, {"date": "Mar 26, 2026", "type": "public", "title": "The Sin: Vanish reaches #61 Billboard 200 (Week 8). Protests at HYBE LA office.", "body": "The Sin: Vanish leaps 74 rungs to No. 61 on the Billboard 200 in its eighth week on chart. Protests against Heeseung’s departure have spread to HYBE’s Los Angeles office, now active at both Seoul HQ and LA simultaneously. Source: Korea Herald, March 26, 2026."}, {"date": "Mar 23, 2026", "type": "official", "title": "Sunoo gestures “6” during fan call — most explicit member confirmation to date", "body": "During a fan call tour spoiler question, Sunoo said: “Since most of the stages will be shown with just the six of us… it’ll come across differently.” He then held up six fingers. Third documented member public reference to the group’s current six-member status — and the most unambiguous. Source: Koreaboo March 23, 2026."}, {"date": "Mar 23, 2026", "type": "contradiction", "title": "Heeseung edited out of Melbourne stage poster — cropped from Sin: Vanish cover art", "body": "The promotional poster displayed on the stage screen during ENHYPEN’s Hello Melbourne performance had Heeseung visibly cropped from the original group image. Members redistributed all his lines: Sunoo covered Bite Me intro and chorus; Jake and Jungwon split Big Girls Don’t Cry parts originally shared with Heeseung. The editing drew criticism for looking “unusual.” Source: Sportskeeda March 14, 2026."}, {"date": "Mar 25, 2026", "type": "official", "title": "Full Heeseung fancall statement documented — “I’m truly sorry for surprising everyone so suddenly”", "body": "Additional quotes from the March 22 fancall were widely reported: “I’m truly sorry for surprising everyone so suddenly” and “I know this may be hard to accept, but I hope you can continue to support both ENHYPEN and me.” He also said “I feel sorry for the members.” The event was held under “Heeseung and ENHYPEN” — fans criticized Belift for continuing to package him under the group name. Source: Manila Bulletin, Korea Times."}, {"date": "Mar 30, 2026", "type": "official", "title": "ENHYPEN announces 4th World Tour “Blood Saga” — six members only", "body": "ENHYPEN officially announces initial dates for their fourth world tour, titled “Blood Saga.” This is the first major promotional activity announced as a six-member group. Heeseung is not included in any capacity. The tour is set to visit multiple continents. Source: Wikipedia (ENHYPEN article, updated March 30, 2026)."}, {"date": "Apr 1, 2026", "type": "public", "title": "Jake says upcoming tour will be “the best concert we’ve done” — accused of shading Heeseung", "body": "During a Weverse live on March 31/April 1, Jake told fans the upcoming Blood Saga tour would be “the best tour, the best concert we’ve done.” A tweet with the clip was later deleted. Many fans interpreted it as implying past OT7 tours were inferior; others defended Jake saying the phrasing is typical of his tour excitement. Source: Koreaboo, April 1, 2026."}, {"date": "Apr 6, 2026", "type": "public", "title": "Heeseung says “I’m going to come back as soon as possible” — vague statement sparks debate", "body": "At an April 6 fancall, Heeseung said: “I cannot tell you all about it, because you know… but one thing I can say certainly is that I’m going to come back as soon as possible.” Fans divided on whether this means a solo comeback or a return to ENHYPEN. Belift Lab has confirmed he will not return to ENHYPEN. Source: Koreaboo April 6, 2026."}, {"date": "Apr 8, 2026", "type": "official", "title": "Heeseung officially launches solo era as EVAN — new name, new Instagram, profile images", "body": "Belift Lab announces Heeseung’s new stage name EVAN and releases profile photos. He explains: “Evan is a name I’ve cherished since childhood… I hope to reach fans with music that fully expresses my most honest and natural self.” New Instagram: @h_evva_n. Belift describes the concept as his “purest form” before any external definition. No album date announced. Sources: Billboard, Korea Herald, April 8, 2026."}, {"date": "Apr 9, 2026", "type": "official", "title": "Blood Saga Seoul tickets sell out in presale — three nights KSPO Dome", "body": "Tickets for all three Seoul dates (May 1–3, KSPO Dome) sold out completely during ENGENE membership presale held April 7–8. Shows will also be streamed online. This is the first commercial confirmation that ENHYPEN’s six-member lineup has maintained its box-office power. Source: Allkpop, Belift Lab, April 9, 2026."}, {"date": "Apr 15, 2026", "type": "official", "title": "ENHYPEN releases official six-member profile photos — Heeseung absent from all platforms", "body": "Belift Lab released new black-and-white group and individual profile photos featuring the remaining six members across all official channels including Weverse, X, and Facebook. This is the first formal update of ENHYPEN’s official imagery since the departure. Fans reacted with comments including “And suddenly I started counting them…” and “He would’ve been in the middle.” Source: Allkpop, GMA News, April 15, 2026."}, {"date": "Apr 8–14, 2026", "type": "public", "title": "Resurfaced debut interview viral: EVAN said “ENHYPEN is the first career for Lee Heeseung”", "body": "A resurfaced clip from ENHYPEN’s debut era shows all seven members answering what the group meant to them. Every other member described ENHYPEN as family and expressed hope to grow together. EVAN’s answer: “To me, ENHYPEN is the first career for Lee Heeseung.” The contrast went viral with fans interpreting it as evidence of always-intended solo plans. Others defended him, noting the wording does not imply disaffection. Source: Koreaboo, April 2026."}, {"date": "Apr 14, 2026", "type": "official", "title": "Full Blood Saga tour dates confirmed — Latin America, USA, UK & Europe", "body": "Full dates released: São Paulo (Jul 4), Lima (Jul 8), Mexico City (Jul 11), Dallas (Jul 17–18), San Diego (Jul 21), Tacoma (Jul 26), Oakland (Jul 28–29), Las Vegas (Aug 1), then Milan, Paris, Amsterdam, Berlin, London (Feb–Mar 2027). ENHYPEN’s first-ever Latin America shows. Previous Walk the Line tour sold out entirely across US and Europe. Source: Billboard, NME, Just Jared, April 14, 2026."}, {"date": "Apr 14, 2026", "type": "public", "title": "Resurfaced debut-era interview: EVAN called ENHYPEN “the first career for Lee Heeseung”", "body": "A debut-era interview resurfaced in which all seven members were asked what ENHYPEN meant to them. Every member except Heeseung described the group as “family.” Heeseung’s answer: “To me, ENHYPEN is the first career for Lee Heeseung.” Many fans cited this as evidence he always viewed the group as a launchpad. Others argued the phrasing was simply about professional identity, not emotional distance. Source: Koreaboo, Shining Awards, April 2026."}, {"date": "Apr 15, 2026", "type": "official", "title": "ENHYPEN releases new six-member official profile photos", "body": "Belift Lab released updated group and individual profile photos featuring only the six remaining members, in black-and-white. The new images replaced all existing headers on X, Facebook, and Weverse. Fan reactions online included: “And suddenly I started counting them…” and “He would’ve been in the middle.” Source: Allkpop, GMA News, April 15, 2026."}, {"date": "Mar 26, 2026", "type": "public", "title": "Jungwon asks fans to stop “number game” in live comments — turns off broadcast", "body": "During a Weverse live, fans flooded Jungwon’s comments with numbers (a code used by OT7 fans demanding Heeseung’s return). Jungwon said: “Everyone, could you please stop with that number game in the comments? I just wish only ENGENEs would come into the lives.” He turned off the live shortly after. Fans who observed this urged other fans to respect the members’ space. Source: Koreaboo, March 26, 2026."}, {"date": "Apr 18, 2026", "type": "public", "title": "EVAN posts iPhone 17 Pro photos — Samsung deal interpreted as ended with ENHYPEN departure", "body": "EVAN shared a photo set on Instagram on April 18 in which an iPhone 17 Pro is clearly visible. ENHYPEN has maintained a Samsung partnership for over two years; members have only been seen with Samsung phones in public settings. Fans and observers widely read this as confirmation that his Samsung deal ended when he left the group, taken as further evidence the departure is permanent and was fully planned. EVAN’s personal logo — visible on earbuds in the same post — was also noted as suggesting solo preparations predated the March 10 announcement. Source: Koreaboo, April 18, 2026."}, {"date": "Apr 17, 2026", "type": "public", "title": "Wider K-pop context: Mark Lee (NCT), TEN (NCT) also depart — wave of 4th-gen exits documented", "body": "Allkpop places Heeseung’s March 10 departure alongside Mark Lee leaving NCT (April 3) and TEN leaving NCT (April 6), documenting a broader pattern of 4th-generation idol exits in early 2026. Mark’s departure involved visible mutual support from NCT members; ENHYPEN members have not publicly acknowledged Heeseung since March 10. Source: Allkpop, April 17, 2026."}, {"date": "Apr 19, 2026", "type": "public", "title": "NCT DREAM vs ENHYPEN member silence comparison goes viral", "body": "After Mark Lee left NCT, NCT members publicly commented on his social media with affection. Jaemin wrote: “Baby, don’t be sad, I’ll kiss you. Love you.” ENHYPEN members have made no public mention of Heeseung since his March 10 departure. Fans widely debated whether this signals strained relations or strict company communication restrictions. Some OT7 fans cited it as evidence Heeseung’s departure was not voluntary. Others argued Belift has restricted members from speaking. Source: Koreaboo, Sportskeeda, April 2026."}], "sources": [{"id": "S01", "category": "Official Statements", "title": "Belift Lab official statement — March 10, 2026", "outlet": "ENHYPEN official X + Soompi", "note": "Primary document analyzed on this site. Official departure announcement citing \"distinct musical vision\" and \"extensive deliberation.\"", "url": "https://x.com/ENHYPEN/status/2031263792613699825"}, {"id": "S02", "category": "Official Statements", "title": "Billboard — \"Most fulfilling approach\" non-answer", "outlet": "Billboard — March 11, 2026", "note": "Belift’s response to Billboard's direct question about why parallel solo was impossible. Restates conclusion without explaining premise.", "url": "https://www.billboard.com/music/music-news/enhypen-label-heeseung-band-exit-most-fulfilling-approach-1236197045/"}, {"id": "S03", "category": "Official Statements", "title": "Billboard — HYBE official letter translation", "outlet": "Billboard", "note": "HYBE's official English translation: \"in line with the direction that was discussed.\"", "url": "https://www.billboard.com/music/music-news/enhypen-heeseung-leaves-group-solo-1236195800/"}, {"id": "S04", "category": "Official Statements", "title": "Manila Bulletin — alternative translation", "outlet": "Manila Bulletin", "note": "\"to follow the direction the company has suggested.\" Second independent translation.", "url": "https://mb.com.ph/2026/03/14/can-16-million-signatures-online-campaign-bring-heeseung-back-to-enhypen"}, {"id": "S05", "category": "Key Contradiction Evidence", "title": "En-O’Clock suspension — March 12, 2026", "outlet": "ENHYPEN YouTube + Soompi", "note": "Weekly pre-recorded series suspended. Confirms Heeseung was still being filmed close enough to announcement date that completed episodes cannot be released.", "url": "https://www.soompi.com/article/1824084wpp/breaking-enhypen-announces-heeseungs-departure-from-group"}, {"id": "S06", "category": "Key Contradiction Evidence", "title": "OT7 merchandise same day as announcement — March 10, 2026", "outlet": "ENHYPEN World + TODAY.com", "note": "OT7 merch scheduled 5PM KST, pulled 40 minutes after departure notice. Source: kpopworld.com March 10.", "url": "https://www.today.com/popculture/music/enhypen-heeseung-leaves-group-rcna197073"}, {"id": "S08", "category": "Key Contradiction Evidence", "title": "Billboard — Jake TV quote + members did not discuss Heeseung", "outlet": "Billboard — March 12, 2026", "note": "Jake: \"There's been a bit of changes in the choreo with the formation, all that.\" Billboard confirms Jake and Jay did not discuss Heeseung’s departure during the interview at all.", "url": "https://www.billboard.com/music/music-news/enhypen-en-o-clock-series-hiatus-heeseung-exit-1236197899/"}, {"id": "S21", "category": "Key Contradiction Evidence", "title": "Korea Herald — Belift reaffirmation + flight cancellation confirmed — March 15", "outlet": "Korea Herald — March 15, 2026", "note": "Belift reaffirms to Korea Herald. First reason given: \"Enhypen's schedule remains extremely demanding.\" Named source Shivani Srinivasan confirms Melbourne flight canceled ~March 12. Primary source for ARG 14 and ARG 15.", "url": "https://www.koreaherald.com/article/10694588"}, {"id": "S23", "category": "Letter Translations", "title": "StarNews Korea — third independent translation", "outlet": "StarNews Korea", "note": "\"depending on the direction the company suggested.\" Third of four independent translations.", "url": "https://star.mt.co.kr/stview.php?no=2026031011253875736"}, {"id": "S47", "category": "Industry Analysis", "title": "Rolling Stone Australia — fourth independent translation", "outlet": "Rolling Stone Australia", "note": "\"according to the direction the company suggested.\" Major mainstream outlet, not K-pop specialist. Most explicit of four translations.", "url": "https://au.rollingstone.com/music/music-news/enhypen-heeseung-leaves-group-solo-album-92326/"}, {"id": "S48", "category": "Industry Analysis", "title": "Korea Times — \"ENHYPEN at Crossroads\" — March 19", "outlet": "Korea Times — March 19, 2026", "note": "Analytical piece presenting multiple perspectives, including observers calling the departure \"a decision that doesn't respect his remaining contract period.\"", "url": "https://www.koreatimes.co.kr/entertainment/k-pop/20260319/after-heeseungs-exit-enhypen-at-crossroads-as-it-enters-7th-year"}, {"id": "S49", "category": "Industry Analysis", "title": "Korea Herald — industry executive: \"There must be some reason both chose to maintain the contract\"", "outlet": "Korea Herald", "note": "Official at a major K-pop company: \"There must be some reason both Heeseung and Belift Lab chose to maintain the contract.\" Recorded neutrally — does not confirm or deny any specific theory.", "url": "https://www.koreaherald.com/article/10692171"}, {"id": "S50", "category": "Key Contradiction Evidence", "title": "kpopworld.com — precise merch timing, D Awards speech, Sin:Vanish stats", "outlet": "kpopworld.com", "note": "Documents precise 5:00 PM KST merch scheduling on March 10. Also documents Heeseung’s D Awards acceptance speech and Sin: Vanish commercial performance.", "url": "https://www.kpopworld.com"}, {"id": "S51", "category": "Official Statements", "title": "Koreaboo — Jungwon \"contract renewal discussions haven't happened yet\" — Jan 14, 2026", "outlet": "Koreaboo — January 16, 2026", "note": "Jungwon states on record that no contract renewal discussions have occurred as of January 2026, while contracts run until November 2027.", "url": "https://www.koreaboo.com/news/enhypen-jungwon-addresses-contract-renewal-sin-vanish-release/"}], "faq": [{"q": "Isn't this just fan speculation?", "a": "No. Every argument on this site is sourced from Belift’s own statements, published interviews, or documented public events. The OT7 merch timing, the En-O’Clock suspension, the Melbourne schedule disruption, the Billboard non-answer, the passive language in Heeseung’s letter — these are documented facts, not fan theories. Speculation is claiming to know what happened. This site does not make that claim. It claims Belift’s statement doesn't match what the public record shows."}, {"q": "Didn't Belift give a reason on March 15? Isn't this resolved?", "a": "Partially. The March 15 Korea Herald statement is the first time Belift addressed why the parallel solo model was structurally impossible. That partial resolution is acknowledged and documented here. What is not resolved: why the answer took 5 days and a direct press inquiry to produce; why Billboard's same question on March 11 received a non-answer; why the Melbourne flight was booked and then canceled two days before the event. The March 15 statement addresses 1 of 16 documented contradictions."}, {"q": "Maybe they kept it vague to protect his privacy?", "a": "Privacy protection does not explain the refusal to answer a structural business question. Billboard's question — why was the parallel model structurally impossible — has nothing to do with Heeseung’s personal life. It's a question about business structure. On March 15, Belift gave the answer: \"Enhypen's schedule remains extremely demanding.\" That answer is not privacy-sensitive. It was available March 10. It was not provided."}, {"q": "He could have been unhappy and chosen this for his wellbeing", "a": "True — and no one here disputes that. Heeseung’s potential unhappiness or burnout is acknowledged as a real possibility. The argument is not \"he was successful so he must have been happy.\" The argument is: if health or burnout was the reason, Belift had industry-validated ways to communicate that without disclosing private medical information. They did not use them. The word 'health' does not appear anywhere in their statement."}, {"q": "'Suggested' is not the same as 'ordered.' He could have chosen to follow the suggestion.", "a": "True — suggestion is not a command, and no one here claims otherwise. The argument is narrower: Belift’s official statement frames this as Heeseung’s own artistic decision. His letter — in four independent translations — says he followed a direction the company suggested. That is a contradiction between two official documents, regardless of whether 'suggested' implies coercion or not."}, {"q": "What about the March 18 NPS disruption?", "a": "On March 18, NPS chairman Kim Sung-joo confirmed that approximately 1,500 emails and international calls temporarily disrupted the NPS International Pension Service Center — a department serving overseas workers and Koreans living abroad. People who genuinely needed pension support could not access services. This site does not endorse this action. It caused direct harm to people unconnected to this situation. NPS confirmed they do not intervene in corporate personnel decisions — the action was also strategically meaningless."}, {"q": "Demanding Heeseung return isn't his choice to make", "a": "Correct. Fans demanding Heeseung’s return are overstepping. A person's career decision cannot be reversed by public pressure. This site does not make that demand and does not endorse it. The arguments here are directed at Belift Lab's public statement — not at Heeseung’s personal choices."}], "i18n": {"en": {"siteTitle": "THE RECORD", "tagline": "Independent Documentation Project — ENHYPEN / Belift Lab", "nav": {"home": "Home", "case": "The Case", "timeline": "Timeline", "analysis": "Analysis", "sources": "Sources", "faq": "FAQ", "news": "AI News"}, "hero": {"title": "Why Belift Lab's Explanation", "titleEm": "Doesn't Add Up", "sub": "Fact-based, sourced analysis of the public record surrounding Heeseung’s departure from ENHYPEN on March 10, 2026. No speculation. No rumors. No unverified claims."}, "counters": {"args": "Documented contradictions", "sigs": "Petition signatures at close", "sources": "Verified sources", "resolved": "Resolved by Belift"}, "updates": "Latest Updates", "caseHero": {"title": "Documented", "titleEm": "Contradictions", "sub": "Every argument below is sourced from Belift’s own statements, published interviews, or documented public events. No speculation. No anonymous sources."}, "timelineHero": {"title": "What Happened,", "titleEm": "When, and Where", "sub": "A chronological record of documented events. No conclusions drawn here — only facts and sources. Red dots mark key contradictions."}, "verdictLabel": "Verdict", "copyBtn": "⎘ Copy", "cardBtn": "↓ Card", "progress": {"label": "Belift’s statements addressed vs total contradictions", "note": "On March 15, Belift gave one partial answer to one question. 15 contradictions remain unaddressed."}, "resolved1": "1 of 16 resolved", "shareBtn": "↗ Share this page", "copied": "Link copied", "newsHero": {"title": "AI-Powered", "titleEm": "News Monitor", "sub": "Uses Claude + live web search to find the latest developments in real time. Requires your Anthropic API key (used in-browser only, never stored)."}, "apiKeyPlaceholder": "sk-ant-...", "searchBtn": "Search for latest news", "searching": "Searching…", "apiKeyNote": "Your key is only used for this request and is never saved."}, "vi": {"siteTitle": "THE RECORD", "tagline": "Dự Án Ghi Chép Độc Lập — ENHYPEN / Belift Lab", "nav": {"home": "Trang Chủ", "case": "Luận Điểm", "timeline": "Dòng Thời Gian", "analysis": "Phân Tích", "sources": "Nguồn Dẫn", "faq": "Câu Hỏi", "news": "Tin AI"}, "hero": {"title": "Tại Sao Giải Thích Của", "titleEm": "Belift Lab Không Nhất Quán", "sub": "Phân tích dựa trên thực tế và nguồn dẫn về hồ sơ công khai xung quanh việc Heeseung rời ENHYPEN ngày 10 tháng 3 năm 2026. Không suy đoán. Không tin đồn. Không tuyên bố chưa xác minh."}, "counters": {"args": "Mâu thuẫn được ghi nhận", "sigs": "Chữ ký kiến nghị khi đóng", "sources": "Nguồn được xác minh", "resolved": "Đã được Belift giải quyết"}, "updates": "Cập Nhật Mới Nhất", "caseHero": {"title": "16 Mâu Thuẫn", "titleEm": "Được Ghi Nhận", "sub": "Mọi luận điểm đều có nguồn từ tuyên bố chính thức của Belift, phỏng vấn được đăng tải, hoặc sự kiện công khai. Không suy đoán. Không nguồn ẩn danh."}, "timelineHero": {"title": "Điều Gì Xảy Ra,", "titleEm": "Khi Nào và Ở Đâu", "sub": "Hồ sơ theo thứ tự thời gian. Không rút ra kết luận — chỉ có sự thật và nguồn dẫn. Chấm đỏ đánh dấu mâu thuẫn chính."}, "verdictLabel": "Kết Luận", "copyBtn": "⎘ Sao chép", "cardBtn": "↓ Tải card", "progress": {"label": "Belift đã giải quyết vs tổng mâu thuẫn", "note": "Ngày 15 tháng 3, Belift đưa ra một câu trả lời bộ phận. 15 mâu thuẫn vẫn chưa được giải quyết."}, "resolved1": "1 trong 16 được giải quyết", "shareBtn": "↗ Chia sẻ", "copied": "Đã sao chép liên kết", "newsHero": {"title": "Theo Dõi Tin Tức", "titleEm": "Bằng AI", "sub": "Dùng Claude + web search để tìm tin tức mới nhất theo thời gian thực. Yêu cầu API key Anthropic của bạn (dùng trong trình duyệt, không lưu trữ)."}, "apiKeyPlaceholder": "sk-ant-...", "searchBtn": "Tìm tin mới nhất", "searching": "Đang tìm kiếm…", "apiKeyNote": "Key chỉ dùng cho yêu cầu này và không bao giờ được lưu lại."}, "ko": {"siteTitle": "THE RECORD", "tagline": "독립 문서화 프로젝트 — ENHYPEN / 빌리프랩", "nav": {"home": "홈", "case": "구조적 사례", "timeline": "타임라인", "analysis": "발표문 분석", "sources": "출처", "faq": "자주 묻는 질문", "news": "AI 뉴스"}, "hero": {"title": "빌리프랩의 설명이", "titleEm": "맞지 않는 이유", "sub": "2026년 3월 10일 ENHYPEN 희승 탈퇴를 둘러싼 공개 기록에 대한 사실 기반, 출처 있는 분석. 추측 없음. 루머 없음. 미확인 주장 없음."}, "counters": {"args": "문서화된 모순", "sigs": "청원 최종 서명자 수", "sources": "검증된 출처", "resolved": "빌리프랩이 해결"}, "updates": "최신 업데이트", "caseHero": {"title": "16개의 문서화된", "titleEm": "모순", "sub": "아래의 모든 논증은 빌리프랩의 자체 발표, 공개된 인터뷰, 또는 문서화된 공개 사건을 출처로 합니다. 추측 없음. 익명 출처 없음."}, "timelineHero": {"title": "무슨 일이, 언제,", "titleEm": "어디서 일어났는가", "sub": "문서화된 사건의 시간순 기록. 결론 도출 없음 — 사실과 출처만. 빨간 점은 핵심 모순."}, "verdictLabel": "판정", "copyBtn": "⎘ 복사", "cardBtn": "↓ 카드", "progress": {"label": "빌리프랩 답변 항목 vs 전체 모순", "note": "3월 15일, 빌리프랩이 하나의 질문에 부분 답변. 15개 모순은 여전히 미답변."}, "resolved1": "16개 중 1개 해결", "shareBtn": "↗ 공유하기", "copied": "링크가 복사되었습니다", "newsHero": {"title": "AI 뉴스", "titleEm": "모니터", "sub": "Claude + 실시간 웹 검색으로 최신 뉴스를
